// ─── VOICE PANEL ─────────────────────────────────────────────────────────────
function VoicePanel({ tLang, onClose }) {
  const [deviceVoices, setDeviceVoices] = useState([]);
  const [selected, setSelected]         = useState(activeVoice);
  const [showAll, setShowAll]           = useState(false);
  const tts   = TARGETS[tLang]?.tts || "fr-FR";
  const pfx   = tts.split("-")[0];
  const tName = TARGETS[tLang]?.name || "French";

  useEffect(() => {
    const load = () => {
      const s = synth();
      if (!s) return;
      try {
        const v = s.getVoices();
        if (v && v.length > 0) setDeviceVoices(v);
      } catch (e) {}
    };
    load();
    // voiceschanged fires on Chrome/Android; Safari populates on first call
    const s = synth();
    if (s && s.addEventListener) {
      s.addEventListener("voiceschanged", load);
      return () => { try { s.removeEventListener("voiceschanged", load); } catch(e){} };
    }
    // Safari fallback: poll until voices appear
    const interval = setInterval(() => { load(); if (deviceVoices.length > 0) clearInterval(interval); }, 200);
    setTimeout(() => clearInterval(interval), 3000);
    return () => clearInterval(interval);
  }, []);

  const langVoices  = deviceVoices.filter(v => v.lang.startsWith(pfx));
  const otherVoices = deviceVoices.filter(v => !v.lang.startsWith(pfx));
  const hasGoodVoice = langVoices.length > 0;

  const selectVoice = (name) => { setSelected(name); activeVoice = name; };

  const TEST_PHRASES = {
    fr:"Bonjour, comment allez-vous aujourd'hui?", es:"Hola, ¿cómo estás hoy?", pt:"Olá, como vai você hoje?",
    it:"Ciao, come stai oggi?", de:"Hallo, wie geht es Ihnen heute?", en:"Hello, how are you today?",
    zh:"你好，你今天怎么样？", ja:"こんにちは、今日はお元気ですか？", ko:"안녕하세요, 오늘 어떻게 지내세요?",
    ru:"Привет, как дела сегодня?", ar:"مرحباً، كيف حالك اليوم؟",
  };
  const testVoice = (name) => {
    const prev = activeVoice;
    activeVoice = name;
    say(TEST_PHRASES[pfx] || TEST_PHRASES[tLang] || "Hello, how are you today?");
    setTimeout(() => { activeVoice = prev; }, 600);
  };

  function VRow({ v }) {
    const isSelected = selected === v.name;
    return (
      <div style={{ background: isSelected ? C.blue+"12" : C.bg, border: `2px solid ${isSelected ? C.blue : C.bdr}`, borderRadius: 10, padding: "10px 13px", marginBottom: 7 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontWeight:700, color:isSelected?C.blue:C.text, fontSize:13 }}>{v.name}</div>
            <div style={{ color:C.muted, fontSize:11, marginTop:2 }}>{v.lang}{v.localService?" · On-device":""}{isSelected?" · Currently active":""}</div>
          </div>
          <div style={{ display:"flex", gap:7 }}>
            <button onPointerDown={e=>{e.preventDefault();testVoice(v.name);}} style={{ background:C.teal, border:"none", borderRadius:6, color:"#fff", padding:"4px 10px", fontSize:11, fontWeight:700, cursor:"pointer" }}>Test</button>
            <button onClick={()=>selectVoice(v.name)} style={{ background:isSelected?C.blue:C.card, border:`2px solid ${isSelected?C.blue:C.bdr}`, borderRadius:6, color:isSelected?"#fff":C.mid, padding:"4px 10px", fontSize:11, fontWeight:700, cursor:"pointer" }}>
              {isSelected?"Selected":"Select"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div onClick={onClose} style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:100, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:C.card, borderRadius:"16px 16px 0 0", padding:22, width:"100%", maxWidth:520, maxHeight:"85vh", overflowY:"auto" }}>

        <div style={{ fontWeight:900, fontSize:17, color:C.text, marginBottom:5 }}>Voice Settings</div>

        {hasGoodVoice ? (
          <div style={{ background:C.green+"12", border:`1px solid ${C.green}30`, borderRadius:10, padding:"10px 13px", marginBottom:14 }}>
            <div style={{ fontWeight:700, color:C.green, fontSize:13 }}>{langVoices.length} {tName} voice{langVoices.length>1?"s":""} found on your device</div>
            <div style={{ color:C.muted, fontSize:12, marginTop:2 }}>Select the one that sounds most natural. Use Test to preview each one.</div>
          </div>
        ) : (
          <div style={{ background:C.red+"10", border:`1px solid ${C.red}30`, borderRadius:10, padding:"13px 14px", marginBottom:14 }}>
            <div style={{ fontWeight:800, color:C.red, fontSize:14, marginBottom:8 }}>No {tName} voices installed on this device</div>
            <div style={{ color:C.mid, fontSize:13, marginBottom:12, lineHeight:1.5 }}>
              Your device needs a <strong>{tName}</strong> voice installed at the system level. Follow the steps for your device:
            </div>
            {[
              ["iPhone / iPad",`Settings → Accessibility → Spoken Content → Voices → ${tName} → tap a voice → Download`],
              ["Mac",`System Settings → Accessibility → Spoken Content → System Voice → Manage Voices → ${tName} → download`],
              ["Android",`Settings → General Management → Language → Text-to-Speech → Language → ${tName} → download`],
              ["Windows",`Settings → Time & Language → Speech → Add voices → search "${tName}"`],
              ["Chrome / other browsers","Voice quality comes from your OS. Follow the steps above, then restart your browser."],
            ].map(([device, steps], i) => (
              <div key={i} style={{ background:C.card, borderRadius:8, padding:"9px 11px", marginBottom:7 }}>
                <div style={{ fontWeight:700, color:C.text, fontSize:12, marginBottom:3 }}>{device}</div>
                <div style={{ color:C.muted, fontSize:11, lineHeight:1.5 }}>{steps}</div>
              </div>
            ))}
          </div>
        )}

        {hasGoodVoice && (
          <>
            <div style={{ fontWeight:700, color:C.mid, fontSize:11, textTransform:"uppercase", letterSpacing:1, marginBottom:9 }}>{tName} voices</div>
            {langVoices.map((v,i) => <VRow key={i} v={v} />)}
            <Info text="On-device voices are faster and sound more natural. Look for Enhanced or Premium in the name for the highest quality." color={C.teal} />
          </>
        )}

        {!hasGoodVoice && otherVoices.length > 0 && (
          <>
            <div style={{ fontWeight:700, color:C.muted, fontSize:11, textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Other voices (not {tName} — pronunciation will not be accurate)</div>
            <div style={{ color:C.muted, fontSize:12, marginBottom:10, lineHeight:1.5 }}>You can pick one as a temporary option, but the pronunciation will not sound like {tName}. Install {tName} voices above for proper audio.</div>
            {(showAll ? otherVoices : otherVoices.slice(0,5)).map((v,i) => <VRow key={i} v={v} />)}
            {!showAll && otherVoices.length > 5 && (
              <button onClick={()=>setShowAll(true)} style={{ background:C.bg, border:`1px solid ${C.bdr}`, borderRadius:8, padding:"7px 14px", fontSize:12, color:C.muted, cursor:"pointer", fontWeight:600, marginBottom:10 }}>
                Show all {otherVoices.length} voices
              </button>
            )}
          </>
        )}

        <button onClick={onClose} style={{ width:"100%", padding:13, background:C.blue, color:"#fff", border:"none", borderRadius:10, fontWeight:700, cursor:"pointer", marginTop:8 }}>Done</button>
      </div>
    </div>
  );
}


// ─── WORD SPACE ───────────────────────────────────────────────────────────────
function WordSpace({ tLang, rLangs }) {
  const tName    = TARGETS[tLang]?.name || "French";
  const tCode    = TARGETS[tLang]?.tts  || "fr-FR";
  const refNames = rLangs.length > 0 ? rLangs.map(l => REFS[l]?.name || l).join(" and ") : "English";

  const [input,    setInput]    = useState("");
  const [result,   setResult]   = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [saved,    setSaved]    = useState(() => {
    try { return JSON.parse(localStorage.getItem("ws_saved") || "[]"); } catch(e) { return []; }
  });

  // Debounced auto-translate
  useEffect(() => {
    if (!input.trim() || input.trim().length < 2) { setResult(null); return; }
    const timer = setTimeout(() => translate(input.trim()), 700);
    return () => clearTimeout(timer);
  }, [input]);

  const translate = async (text) => {
    setLoading(true);
    try {
      const prompt = `You are a ${tName} language coach for ${refNames} speakers. The user typed: "${text}". This could be in any language. Detect the language, translate to ${tName} if not already in ${tName} (and also to ${refNames} if it was in ${tName}), and provide rich learning content. Return ONLY valid JSON: {"input_lang":"language detected","input_text":"${text}","translation_fr":"translation in ${tName}","translation_ref":"translation in ${refNames}","pronunciation":"phonetic guide for the ${tName} version","literal_breakdown":[{"word":"each ${tName} word","meaning":"what it means"}],"explanation":"grammar and usage explanation — why is it structured this way in ${tName}?","ref_comparison":"how does this compare to ${refNames}? same structure? different?","examples":[{"fr":"example 1 in ${tName}","en":"English","ref":"in ${refNames}"},{"fr":"example 2","en":"English","ref":"ref"},{"fr":"example 3","en":"English","ref":"ref"},{"fr":"example 4","en":"English","ref":"ref"}],"tip":"one key thing to remember about this word or phrase"}`;
      if (!isLoggedIn()) { setResult({ error: "NO_KEY" }); setLoading(false); return; }
      const result = await askClaude(prompt, 900, tLang);
      setResult(result);
    } catch(e) {
      setResult({ error: "Could not translate. Check your connection." });
    }
    setLoading(false);
  };

  const saveEntry = () => {
    if (!result || !result.translation_fr) return;
    const entry = {
      id: Date.now(),
      input: input.trim(),
      fr: result.translation_fr,
      ref: result.translation_ref || "",
      pronunciation: result.pronunciation || "",
      date: new Date().toLocaleDateString(),
    };
    const updated = [entry, ...saved].slice(0, 100);
    setSaved(updated);
    try { localStorage.setItem("ws_saved", JSON.stringify(updated)); } catch(e) {}
  };

  const deleteEntry = (id) => {
    const updated = saved.filter(s => s.id !== id);
    setSaved(updated);
    try { localStorage.setItem("ws_saved", JSON.stringify(updated)); } catch(e) {}
  };

  return (
    <div>
      <Heading title="Translator & Word Space" sub="Type anything in any language. Get the translation, pronunciation, grammar breakdown, and real examples instantly." color={C.purple} />
      <Info text="Start typing — results appear automatically. Use this to look up words you encounter in the wild: song lyrics, menus, street signs, messages. Save useful translations to your personal log below." color={C.teal} />

      {/* Big input */}
      <div style={{ background: C.card, border: `2px solid ${C.purple}`, borderRadius: 14, overflow: "hidden", marginBottom: 12, boxShadow: C.sh }}>
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          placeholder={`Type anything — in ${tName}, ${refNames}, or English...`}
          rows={4}
          style={{ width: "100%", padding: "16px", border: "none", outline: "none", fontSize: 18, fontWeight: 500, resize: "none", background: "transparent", boxSizing: "border-box", color: C.text }}
        />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderTop: `1px solid ${C.bdr}`, background: C.soft }}>
          <div style={{ color: C.muted, fontSize: 11 }}>{loading ? "Translating..." : input.trim().length > 1 ? "Auto-translating..." : "Start typing to translate"}</div>
          <div style={{ display: "flex", gap: 8 }}>
            {input.trim() && <button onClick={() => { setInput(""); setResult(null); }} style={{ background: "none", border: `1px solid ${C.bdr}`, borderRadius: 7, padding: "4px 11px", color: C.muted, fontSize: 12, cursor: "pointer" }}>Clear</button>}
            {result && result.translation_fr && <button onClick={() => say(result.translation_fr)} style={{ background: C.blue, border: "none", borderRadius: 7, padding: "4px 11px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>▶ Hear it</button>}
          </div>
        </div>
      </div>

      {/* Translation result */}
      {loading && (
        <div style={{ background: C.card, borderRadius: 12, padding: "20px 16px", textAlign: "center", color: C.muted, boxShadow: C.sh, marginBottom: 12 }}>
          <div style={{ fontSize: 13 }}>Translating and building your learning content...</div>
        </div>
      )}

      {!loading && result && !result.error && (
        <div>
          {/* Main translation */}
          <div style={{ background: C.card, border: `2px solid ${C.purple}30`, borderRadius: 14, padding: "16px", marginBottom: 10, boxShadow: C.sh }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div style={{ flex: 1 }}>
                {result.input_lang && <div style={{ color: C.muted, fontSize: 11, marginBottom: 8 }}>Detected: {result.input_lang}</div>}
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 6 }}>
                  <span style={{ fontWeight: 900, color: C.blue, fontSize: 26 }}>{result.translation_fr}</span>
                  <button onPointerDown={e => { e.preventDefault(); say(result.translation_fr); }} style={{ background: C.blue, border: "none", borderRadius: 7, padding: "4px 12px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>▶ Listen</button>
                </div>
                {result.pronunciation && <div style={{ color: C.teal, fontSize: 14, fontStyle: "italic", marginBottom: 6 }}>{result.pronunciation}</div>}
                {result.translation_ref && <div style={{ color: C.orange, fontSize: 14 }}>🌐 {refNames}: {result.translation_ref}</div>}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>
                <button onClick={saveEntry} style={{ background: C.purple + "15", border: `1px solid ${C.purple}30`, borderRadius: 9, padding: "7px 13px", color: C.purple, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                  + Save
                </button>
                <SaveToFlashcardsBtn card={{ lang: tLang, front: result.translation_fr, back: result.translation_ref || input.trim(), pronunciation: result.pronunciation, example: result.examples?.[0]?.fr || "" }} />
              </div>
            </div>

            {/* Word breakdown */}
            {Array.isArray(result.literal_breakdown) && result.literal_breakdown.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontWeight: 700, color: C.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Word by word</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {result.literal_breakdown.map((item, i) => (
                    <div key={i} style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 9, padding: "7px 11px", textAlign: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3 }}>
                        <span style={{ fontWeight: 800, color: C.blue, fontSize: 14 }}>{item.word}</span>
                        <PlayBtn text={item.word || ""} sm />
                      </div>
                      <div style={{ color: C.muted, fontSize: 11 }}>{item.meaning}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Grammar explanation */}
          {result.explanation && (
            <div style={{ background: C.blue + "08", border: `1px solid ${C.blue}20`, borderLeft: `3px solid ${C.blue}`, borderRadius: 9, padding: "12px 14px", marginBottom: 10 }}>
              <div style={{ fontWeight: 700, color: C.blue, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Grammar & Usage</div>
              <div style={{ color: C.mid, fontSize: 13, lineHeight: 1.6 }}>{result.explanation}</div>
            </div>
          )}

          {/* Reference language comparison */}
          {result.ref_comparison && (
            <div style={{ background: C.orange + "08", border: `1px solid ${C.orange}20`, borderLeft: `3px solid ${C.orange}`, borderRadius: 9, padding: "12px 14px", marginBottom: 10 }}>
              <div style={{ fontWeight: 700, color: C.orange, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Compared to {refNames}</div>
              <div style={{ color: C.mid, fontSize: 13, lineHeight: 1.6 }}>{result.ref_comparison}</div>
            </div>
          )}

          {/* Memory tip */}
          {result.tip && (
            <div style={{ background: C.green + "08", border: `1px solid ${C.green}20`, borderLeft: `3px solid ${C.green}`, borderRadius: 9, padding: "10px 14px", marginBottom: 10 }}>
              <span style={{ fontWeight: 700, color: C.green, fontSize: 11 }}>TIP  </span>
              <span style={{ color: C.mid, fontSize: 13 }}>{result.tip}</span>
            </div>
          )}

          {/* Examples */}
          {Array.isArray(result.examples) && result.examples.length > 0 && (
            <div>
              <div style={{ fontWeight: 700, color: C.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 9 }}>More examples in context — tap ▶ to hear</div>
              {result.examples.map((ex, i) => ex && ex.fr && (
                <div key={i} style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 10, padding: "10px 13px", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 4, flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 800, color: C.blue, fontSize: 15 }}>{ex.fr}</span>
                    <PlayBtn text={ex.fr} />
                  </div>
                  {ex.en && <div style={{ color: C.mid, fontSize: 12, marginBottom: ex.ref ? 3 : 0 }}>🇬🇧 {ex.en}</div>}
                  {ex.ref && <div style={{ color: C.orange, fontSize: 12 }}>🌐 {ex.ref}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {result && result.error && (
        result.error === "NO_KEY" || result.error === "INVALID_KEY"
          ? <div style={{ background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:10, padding:"13px 14px" }}>
              <div style={{ fontWeight:700, color:"#dc2626", fontSize:14, marginBottom:5 }}>Session expired</div>
              <div style={{ color:"#7f1d1d", fontSize:13, lineHeight:1.5 }}>
                Please refresh the page and log in again with your access code.
              </div>
            </div>
          : <Info text={result.error} color={C.red} />
      )}

      {/* Saved words */}
      {saved.length > 0 && (
        <div style={{ marginTop: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontWeight: 800, color: C.mid, fontSize: 14 }}>Saved Words ({saved.length})</div>
            <div style={{ color: C.muted, fontSize: 11 }}>Stays between sessions</div>
          </div>
          {saved.map(entry => (
            <div key={entry.id} style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 11, padding: "11px 14px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, boxShadow: C.sh }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                  <span style={{ fontWeight: 800, color: C.blue, fontSize: 16 }}>{entry.fr}</span>
                  <PlayBtn text={entry.fr} sm />
                </div>
                {entry.pronunciation && <div style={{ color: C.teal, fontSize: 11, marginBottom: 2 }}>{entry.pronunciation}</div>}
                <div style={{ color: C.muted, fontSize: 12 }}>{entry.input}{entry.ref ? " · " + entry.ref : ""}</div>
                <div style={{ color: C.bdr, fontSize: 10, marginTop: 2 }}>{entry.date}</div>
              </div>
              <button onClick={() => { setInput(entry.input || entry.fr); }} style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 7, padding: "5px 10px", color: C.muted, fontSize: 11, cursor: "pointer", marginRight: 4 }}>Reload</button>
              <button onClick={() => deleteEntry(entry.id)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 18, padding: "0 4px", lineHeight: 1 }}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


// ─── FLASHCARDS ──────────────────────────────────────────────────────────────
function Flashcards({ tLang, onStreakUpdate }) {
  const tName = TARGETS[tLang]?.name || "French";
  const [cards, setCards]     = useState(() => fcLoad().filter(c => c.lang === tLang));
  const [view, setView]       = useState("review"); // "review" | "browse" | "add"
  const [flipped, setFlipped] = useState(false);
  const [addForm, setAddForm] = useState({ front:"", back:"", pronunciation:"", example:"" });
  const [addErr, setAddErr]   = useState("");
  const [addOk, setAddOk]     = useState(false);

  const now      = Date.now();
  const dueCards = cards.filter(c => c.next_review <= now);
  const current  = dueCards[0] || null;

  const refreshCards = () => setCards(fcLoad().filter(c => c.lang === tLang));

  const rate = (quality) => {
    if (!current) return;
    const updated = sm2(current, quality);
    const all = fcLoad();
    const idx = all.findIndex(c => c.id === current.id);
    if (idx >= 0) { all[idx] = updated; fcSave(all); }
    setFlipped(false);
    refreshCards();
    _streak.log();
    if (onStreakUpdate) onStreakUpdate();
  };

  const deleteCard = (id) => {
    const all = fcLoad().filter(c => c.id !== id);
    fcSave(all);
    refreshCards();
  };

  const addCard = () => {
    setAddErr(""); setAddOk(false);
    if (!addForm.front.trim() || !addForm.back.trim()) { setAddErr("Word and meaning are required."); return; }
    const ok = fcAdd({ lang: tLang, front: addForm.front.trim(), back: addForm.back.trim(), pronunciation: addForm.pronunciation.trim(), example: addForm.example.trim() });
    if (!ok) { setAddErr("This word is already in your flashcards."); return; }
    refreshCards();
    setAddForm({ front:"", back:"", pronunciation:"", example:"" });
    setAddOk(true);
    setTimeout(() => setAddOk(false), 2000);
  };

  const importFromWordSpace = () => {
    try {
      const ws = JSON.parse(localStorage.getItem("ws_saved") || "[]");
      let added = 0;
      ws.forEach(entry => {
        if (fcAdd({ lang: tLang, front: entry.fr, back: entry.ref || entry.input || "", pronunciation: entry.pronunciation || "", example: "" })) added++;
      });
      refreshCards();
      alert(`Imported ${added} new words from Word Space.`);
    } catch(e) {}
  };

  const totalCards   = cards.length;
  const learnedCards = cards.filter(c => c.repetitions > 0).length;
  const RATE_BTNS = [
    { q:0, label:"Again",  color:C.red,    desc:"Didn't know it" },
    { q:1, label:"Hard",   color:C.orange, desc:"Struggled" },
    { q:2, label:"Good",   color:C.blue,   desc:"Knew it" },
    { q:3, label:"Easy",   color:C.green,  desc:"Too easy" },
  ];

  return (
    <div>
      <Heading title="Flashcards" sub={`Spaced repetition — SM-2 algorithm. ${dueCards.length} card${dueCards.length !== 1 ? "s" : ""} due now.`} color={C.teal} />
      {cards.length === 0
        ? <Info text="Your flashcard deck is empty. Save words while using the AI Coach (New Word exercise → Save to Flashcards) or the Vocabulary tab. Then come back here each day to review." color={C.teal} />
        : dueCards.length === 0
          ? <Info text="All caught up! No cards due right now. Come back later or add new words from the AI Coach." color={C.green} />
          : <Info text="Rate each card honestly — 'Again' brings it back immediately; 'Easy' schedules it days away. The algorithm does the rest. Daily review beats long sessions." color={C.teal} />
      }

      {/* Stats row */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
        {[
          ["Total", totalCards, C.blue],
          ["Due now", dueCards.length, dueCards.length > 0 ? C.orange : C.green],
          ["Learned", learnedCards, C.purple],
        ].map(([label, val, col]) => (
          <div key={label} style={{ background:C.card, borderRadius:10, padding:"10px 12px", textAlign:"center", border:`1px solid ${C.bdr}`, boxShadow:C.sh }}>
            <div style={{ fontWeight:900, fontSize:22, color:col }}>{val}</div>
            <div style={{ color:C.muted, fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, marginTop:2 }}>{label}</div>
          </div>
        ))}
      </div>

      {/* View tabs */}
      <div style={{ display:"flex", gap:7, marginBottom:14 }}>
        {[["review","Review","🃏"],["browse","All Cards","📋"],["add","Add Card","＋"]].map(([v,label,icon]) => (
          <button key={v} onClick={() => setView(v)} style={{
            padding:"6px 14px", borderRadius:20, border:`2px solid ${view===v?C.teal:C.bdr}`,
            background:view===v?C.teal:C.card, color:view===v?"#fff":C.muted,
            fontSize:11, fontWeight:700, cursor:"pointer",
          }}>{icon} {label}</button>
        ))}
        <button onClick={importFromWordSpace} style={{ padding:"6px 14px", borderRadius:20, border:`1px solid ${C.bdr}`, background:C.card, color:C.muted, fontSize:11, cursor:"pointer", marginLeft:"auto" }}>
          Import Word Space
        </button>
      </div>

      {/* ── REVIEW VIEW ── */}
      {view === "review" && (
        <div>
          {dueCards.length === 0 ? (
            <div style={{ background:C.card, borderRadius:16, padding:"36px 20px", textAlign:"center", boxShadow:C.sh, border:`1px solid ${C.bdr}` }}>
              <div style={{ fontSize:44, marginBottom:12 }}>🎉</div>
              <div style={{ fontWeight:900, fontSize:18, color:C.green, marginBottom:8 }}>All caught up!</div>
              <div style={{ color:C.muted, fontSize:13, marginBottom:16 }}>
                {totalCards === 0 ? "You have no flashcards yet. Add some using the AI Coach, Word Space, or the Add Card tab." : `All ${totalCards} cards reviewed. Come back tomorrow for your next session.`}
              </div>
              {totalCards === 0 && (
                <button onClick={() => setView("add")} style={{ padding:"11px 24px", background:C.teal, color:"#fff", border:"none", borderRadius:10, fontWeight:700, cursor:"pointer" }}>
                  Add Your First Card
                </button>
              )}
            </div>
          ) : (
            <div>
              <div style={{ textAlign:"center", color:C.muted, fontSize:12, marginBottom:10 }}>{dueCards.length} remaining in this session</div>
              {/* Card */}
              <div onClick={() => setFlipped(f => !f)} style={{
                background:C.card, border:`2px solid ${C.teal}`, borderRadius:18,
                padding:"32px 20px", textAlign:"center", marginBottom:14, cursor:"pointer",
                boxShadow:`0 4px 16px ${C.teal}25`, minHeight:180,
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              }}>
                {!flipped ? (
                  <>
                    <div style={{ fontWeight:900, color:C.blue, fontSize:30, marginBottom:8 }}>{current.front}</div>
                    {current.pronunciation && <div style={{ color:C.teal, fontSize:14, fontStyle:"italic", marginBottom:6 }}>{current.pronunciation}</div>}
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                      <PlayBtn text={current.front} />
                    </div>
                    <div style={{ color:C.muted, fontSize:12 }}>Tap to reveal meaning</div>
                  </>
                ) : (
                  <>
                    <div style={{ fontWeight:900, color:C.blue, fontSize:30, marginBottom:8 }}>{current.front}</div>
                    <div style={{ color:C.mid, fontSize:18, marginBottom:8 }}>= {current.back}</div>
                    {current.example && (
                      <div style={{ background:C.bg, borderRadius:9, padding:"8px 12px", marginBottom:8, maxWidth:"100%" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:6, justifyContent:"center", flexWrap:"wrap" }}>
                          <span style={{ color:C.mid, fontSize:13, fontStyle:"italic" }}>{current.example}</span>
                          {current.example && <PlayBtn text={current.example} sm />}
                        </div>
                      </div>
                    )}
                    <div style={{ color:C.muted, fontSize:11 }}>Next in: {current.interval}d · Interval × {current.ease?.toFixed(1)}</div>
                  </>
                )}
              </div>
              {/* Rate buttons — only show after flip */}
              {flipped && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }} className="grid-2-xs">
                  {RATE_BTNS.map(b => (
                    <button key={b.q} onClick={() => rate(b.q)} style={{
                      padding:"12px 6px", borderRadius:11, border:`2px solid ${b.color}30`,
                      background:b.color+"12", color:b.color, fontWeight:800, fontSize:13,
                      cursor:"pointer", textAlign:"center", minHeight:56,
                    }}>
                      <div>{b.label}</div>
                      <div style={{ fontSize:10, fontWeight:500, marginTop:2, opacity:.8 }}>{b.desc}</div>
                    </button>
                  ))}
                </div>
              )}
              {!flipped && (
                <button onClick={() => setFlipped(true)} style={{ width:"100%", padding:12, background:C.teal, color:"#fff", border:"none", borderRadius:11, fontWeight:700, fontSize:14, cursor:"pointer" }}>
                  Show Answer
                </button>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── BROWSE VIEW ── */}
      {view === "browse" && (
        <div>
          {cards.length === 0 ? (
            <Info text={`No ${tName} flashcards yet. Add cards using the AI Coach New Word exercise, Word Space, or the Add Card tab.`} color={C.teal} />
          ) : (
            cards.map(c => {
              const isDue = c.next_review <= now;
              const days  = Math.max(0, Math.round((c.next_review - now) / 86400000));
              return (
                <div key={c.id} style={{ background:C.card, border:`1px solid ${isDue?C.orange:C.bdr}`, borderRadius:11, padding:"11px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:10, boxShadow:C.sh }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:2 }}>
                      <span style={{ fontWeight:800, color:C.blue, fontSize:15 }}>{c.front}</span>
                      <PlayBtn text={c.front} sm />
                      {isDue && <span style={{ background:C.orange+"15", color:C.orange, fontSize:9, fontWeight:700, padding:"1px 7px", borderRadius:10 }}>DUE</span>}
                    </div>
                    <div style={{ color:C.mid, fontSize:12, marginBottom:2 }}>= {c.back}</div>
                    <div style={{ color:C.muted, fontSize:10 }}>
                      {c.repetitions === 0 ? "New" : `Next review: ${isDue ? "now" : `in ${days}d`} · Rep ${c.repetitions}`}
                    </div>
                  </div>
                  <button onClick={() => deleteCard(c.id)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:18, padding:"0 4px", lineHeight:1 }}>×</button>
                </div>
              );
            })
          )}
        </div>
      )}

      {/* ── ADD CARD VIEW ── */}
      {view === "add" && (
        <div style={{ background:C.card, borderRadius:14, padding:"18px 16px", boxShadow:C.sh, border:`1px solid ${C.bdr}` }}>
          <div style={{ fontWeight:800, color:C.text, fontSize:15, marginBottom:14 }}>Add a {tName} Flashcard</div>
          {[
            { key:"front",        label:`Word in ${tName} *`,     placeholder:`e.g. bonjour`,       required:true  },
            { key:"back",         label:"Meaning *",              placeholder:`e.g. hello`,          required:true  },
            { key:"pronunciation",label:"Pronunciation",          placeholder:`e.g. bohn-ZHOOR`,     required:false },
            { key:"example",      label:`Example sentence in ${tName}`, placeholder:`e.g. Bonjour tout le monde`, required:false },
          ].map(f => (
            <div key={f.key} style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.mid, marginBottom:4 }}>{f.label}</div>
              <input
                value={addForm[f.key]}
                onChange={e => setAddForm(p => ({...p, [f.key]: e.target.value}))}
                placeholder={f.placeholder}
                style={{ width:"100%", padding:"10px 13px", borderRadius:9, border:`2px solid ${C.bdr}`, fontSize:13, boxSizing:"border-box" }}
              />
            </div>
          ))}
          {addErr && <div style={{ color:C.red, fontSize:13, marginBottom:10 }}>{addErr}</div>}
          {addOk  && <div style={{ color:C.green, fontSize:13, marginBottom:10 }}>✓ Card added!</div>}
          <button onClick={addCard} style={{ width:"100%", padding:12, background:C.teal, color:"#fff", border:"none", borderRadius:10, fontWeight:700, fontSize:14, cursor:"pointer" }}>
            Add Card
          </button>
        </div>
      )}
    </div>
  );
}

function App() {
  const mobile = useMobile();
  const [tab, setTab]               = useState(0);

  const [rLangs, setRLangs]         = useState(["en"]);
  const [showLang, setShowLang]     = useState(false);
  const [showVoice, setShowVoice]   = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showUpgrade, setShowUpgrade] = useState(false);
  const [showHowTo, setShowHowTo]   = useState(false);
  const [loggedIn, setLoggedIn]     = useState(isLoggedIn());
  const [renewedBanner, setRenewedBanner] = useState(false);
  const [showOnboarding, setShowOnboarding] = useState(() => {
    try { return localStorage.getItem("_new_login") === "1"; } catch(e) { return false; }
  });
  const [isFree, setIsFree]         = useState(getUserPlan() === "free");
  // Warn when session expires within 3 days (0 = today) — only for paid users
  const [expiryWarning, setExpiryWarning] = useState(() => {
    if (!_authExpiry || isFree) return null;
    const days = Math.floor((new Date(_authExpiry) - new Date()) / 86400000);
    return (days >= 0 && days <= 3) ? days : null;
  });
  const [streak, setStreak] = useState(() => _streak.get().count);

  useEffect(() => {
    // Listen for session-renewed events dispatched by askClaude when nonce mismatch
    const handler = () => { setLoggedIn(false); setRenewedBanner(true); };
    window.addEventListener("session-renewed", handler);
    return () => window.removeEventListener("session-renewed", handler);
  }, []);

  useEffect(() => {
    // Keep streak counter in sync whenever _streak.log() fires
    const handler = (e) => setStreak(e.detail?.count ?? _streak.get().count);
    window.addEventListener("streak-updated", handler);
    return () => window.removeEventListener("streak-updated", handler);
  }, []);

  useEffect(() => {
    // Show upgrade modal when free AI limit hit
    const handler = () => setShowUpgrade(true);
    window.addEventListener("show-upgrade", handler);
    return () => window.removeEventListener("show-upgrade", handler);
  }, []);

  // Validate token on startup — syncs plan from DB (catches free→paid upgrades)
  useEffect(() => {
    if (!isLoggedIn()) return;
    fetch("/api/auth/validate", {
      headers: { "Authorization": "Bearer " + getToken() },
    })
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (!d || !d.valid) return;
        // Update plan in localStorage if it changed (e.g. free user subscribed)
        if (d.plan && d.plan !== getUserPlan()) {
          try { localStorage.setItem("auth_plan", d.plan); _userPlan = d.plan; } catch(_) {}
          setIsFree(d.plan === "free");
        }
        // needsRelogin = free JWT but DB says paid → prompt to use access code
        if (d.needsRelogin) {
          window.dispatchEvent(new CustomEvent("show-upgrade", { detail: { upgraded: true } }));
        }
      })
      .catch(() => {});
  }, []);

  useEffect(() => {
    loadVoices();
    const s = synth();
    if (s && s.addEventListener) {
      s.addEventListener("voiceschanged", loadVoices);
      return () => { try { s.removeEventListener("voiceschanged", loadVoices); } catch(e){} };
    }
    // Safari fallback: poll for voices
    const interval = setInterval(loadVoices, 250);
    setTimeout(() => clearInterval(interval), 3000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    activeLang  = TARGETS[tLang]?.tts || "fr-FR";
    activeVoice = "";
  }, [tLang]);

  const toggleRef = (code) => {
    if (code === tLang) return;
    setRLangs(prev =>
      prev.includes(code)
        ? prev.filter(l => l !== code)
        : [...prev, code].slice(0, 3)
    );
  };

  const TAB_LABELS = ["Quick Reference","AI Coach","Grammar","Structures","Vocabulary","Drills","Dialogues","Roadmap","Word Space","Flashcards"];

  if (!loggedIn) return <AccessCodeLogin onLogin={() => setLoggedIn(true)} renewedBanner={renewedBanner} />;

  return (
    <div style={{ fontFamily: "system-ui, -apple-system, sans-serif", background: C.bg, minHeight: "100vh", color: C.text, maxWidth: 900, margin: "0 auto" }} className="safe-bottom">

      {/* ── ONBOARDING MODAL (first login only) ── */}
      {showOnboarding && (
        <OnboardingModal tLang={tLang} onSetTab={setTab} onDone={() => {
          try { localStorage.removeItem("_new_login"); localStorage.setItem("_seen_onboard","1"); } catch(e){}
          setShowOnboarding(false);
        }}/>
      )}

      {/* ── HOW TO USE MODAL ── */}
      {showHowTo && <HowToUseModal onClose={() => setShowHowTo(false)} tLang={tLang} onSetTab={setTab} />}

      {/* ── UPGRADE MODAL (free tier limit hit) ── */}

        <div onClick={() => setShowUpgrade(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.65)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:"#fff", borderRadius:18, padding:"28px 24px", width:"100%", maxWidth:380, boxShadow:"0 20px 60px rgba(0,0,0,0.3)", textAlign:"center" }}>

      {/* ── HEADER ── */}
      <div className="safe-top" style={{ background: C.card, borderBottom: `1px solid ${C.bdr}`, boxShadow: C.sh, position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ padding: mobile ? "10px 12px 8px" : "12px 15px 10px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
          <div style={{ minWidth: 0, flex: 1 }}>
            {!mobile && (
              <div style={{ fontSize: 9, color: C.blue, textTransform: "uppercase", letterSpacing: 3, fontWeight: 700, marginBottom: 3 }}>
                TONGE · SPEAK EVERY TONGUE
              </div>
            )}
            <div style={{ fontWeight: 900, fontSize: mobile ? 15 : 17, color: C.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
              {TARGETS[tLang]?.flag} {mobile ? TARGETS[tLang]?.name : `Learning ${TARGETS[tLang]?.name}`}
              {!mobile && rLangs.length > 0 && (
                <span style={{ fontWeight: 400, fontSize: 12, color: C.muted }}>
                  {" "}· via {rLangs.map(l => REFS[l]?.name).join(", ")}
                </span>
              )}
            </div>
            {streak > 0 && (
              <div style={{ fontSize: 11, color: C.orange, fontWeight: 700, marginTop: 1 }}>
                🔥 {streak}-day streak
              </div>
            )}
          </div>
          <div style={{ display: "flex", gap: mobile ? 5 : 7, flexShrink: 0 }}>
            <button onClick={() => setShowHowTo(true)} title="How to use Tonge" style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 8, padding: mobile ? "7px 9px" : "6px 11px", fontSize: mobile ? 15 : 11, fontWeight: 700, color: C.mid, cursor: "pointer", lineHeight: 1 }}>
              {mobile ? "❓" : "Help"}
            </button>
            <button onClick={() => setShowVoice(true)} style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 8, padding: mobile ? "7px 9px" : "6px 11px", fontSize: mobile ? 15 : 11, fontWeight: 700, color: C.mid, cursor: "pointer", lineHeight: 1 }}>
              {mobile ? "🔊" : "Voice"}
            </button>
            <button onClick={() => setShowSettings(true)} style={{ background: C.blue, border: "none", borderRadius: 8, padding: mobile ? "7px 9px" : "6px 11px", fontSize: mobile ? 15 : 11, fontWeight: 700, color: "#fff", cursor: "pointer", lineHeight: 1 }}>
              {mobile ? "⚙️" : "Account"}
            </button>
            <button onClick={() => setShowLang(v => !v)} style={{ background: showLang ? C.text : C.blue, border: "none", borderRadius: 8, padding: mobile ? "7px 9px" : "6px 11px", fontSize: mobile ? 15 : 11, fontWeight: 700, color: "#fff", cursor: "pointer", lineHeight: 1 }}>
              {mobile ? "🌐" : "Languages"}
            </button>
          </div>
        </div>

        {/* Language picker */}
        {showLang && (
          <div style={{ padding: "13px 15px 14px", borderTop: `1px solid ${C.bdr}`, background: C.soft }}>
            <div style={{ display: "flex", flexDirection: mobile ? "column" : "row", gap: 14 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, color: C.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>I am learning</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {Object.entries(TARGETS).map(([code, l]) => (
                    <button key={code} onClick={() => { setTLang(code); setRLangs(prev => prev.filter(r => r !== code)); }} style={{
                      padding: "7px 13px", borderRadius: 20, minHeight: 36,
                      border: `2px solid ${tLang === code ? C.blue : C.bdr}`,
                      cursor: "pointer", fontSize: 12, fontWeight: 700,
                      background: tLang === code ? C.blue : C.card, color: tLang === code ? "#fff" : C.mid,
                    }}>{l.flag} {l.name}</button>
                  ))}
                </div>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, color: C.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>My reference languages (up to 3)</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {Object.entries(REFS).filter(([code]) => code !== tLang).map(([code, l]) => (
                    <button key={code} onClick={() => toggleRef(code)} style={{
                      padding: "7px 13px", borderRadius: 20, minHeight: 36,
                      border: `2px solid ${rLangs.includes(code) ? C.orange : C.bdr}`,
                      cursor: "pointer", fontSize: 12, fontWeight: 700,
                      background: rLangs.includes(code) ? C.orange : C.card, color: rLangs.includes(code) ? "#fff" : C.mid,
                    }}>{l.flag} {l.name}</button>
                  ))}
                </div>
                {TARGETS[tLang]?.synergy?.some(s => rLangs.includes(s)) && (
                  <div style={{ color: C.green, fontSize: 11, marginTop: 8, fontWeight: 600 }}>
                    ✨ Synergy — your languages share vocabulary and grammar!
                  </div>
                )}
              </div>
            </div>
            <button onClick={() => setShowLang(false)} style={{ marginTop: 14, width: "100%", padding: "10px 18px", background: C.blue, color: "#fff", border: "none", borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              Done ✓
            </button>
          </div>
        )}

        {/* Tab bar */}
        <div style={{ display: "flex", overflowX: "auto", scrollbarWidth: "none", borderTop: `1px solid ${C.bdr}` }}>
          {TAB_LABELS.map((label, i) => (
            <button key={i} onClick={() => setTab(i)} style={{
              padding: mobile ? "11px 11px 9px" : "10px 13px 8px", background: "none", border: "none",
              borderBottom: tab === i ? `3px solid ${C.blue}` : "3px solid transparent",
              color: tab === i ? C.blue : C.muted, cursor: "pointer",
              fontSize: mobile ? 10 : 11, fontWeight: 700, whiteSpace: "nowrap",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{ padding: mobile ? "12px 10px 80px" : "16px 13px 60px" }}>
        {tab === 0 && <TodaysPractice tLang={tLang} onGoToTab={setTab} />}
        {tab === 0 && <CheatSheet  tLang={tLang} rLangs={rLangs} />}
        {tab === 1 && <AICoach     tLang={tLang} rLangs={rLangs} />}
        {tab === 2 && <Grammar     tLang={tLang} rLangs={rLangs} />}
        {tab === 3 && <Structures  tLang={tLang} rLangs={rLangs} />}
        {tab === 4 && <Vocab       tLang={tLang} rLangs={rLangs} />}
        {tab === 5 && <Drills      tLang={tLang} />}
        {tab === 6 && <Dialogues   tLang={tLang} />}
        {tab === 7 && <Roadmap     tLang={tLang} />}
        {tab === 8 && <WordSpace   tLang={tLang} rLangs={rLangs} />}
        {tab === 9 && <Flashcards  tLang={tLang} onStreakUpdate={() => setStreak(_streak.get().count)} />}
      </div>

      {showVoice && <VoicePanel tLang={tLang} onClose={() => setShowVoice(false)} />}
      {showSettings && <SettingsPanel onClose={() => setShowSettings(false)} onLogout={() => { setLoggedIn(false); setShowSettings(false); }} />}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
