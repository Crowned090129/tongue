  <!-- Capacitor: push notification initialisation.
       Runs only when inside the native iOS/Android app (window.Capacitor exists).
       Requests permission once after login, registers token with our backend. -->
  <script>
  (function() {
    // Wait for Capacitor bridge to be ready
    document.addEventListener("deviceready", initNative, false);
    // Also try immediately in case bridge is already loaded
    if (window.Capacitor) initNative();

    function initNative() {
      if (!window.Capacitor?.isNativePlatform()) return;
      const { PushNotifications } = window.Capacitor.Plugins;
      if (!PushNotifications) return;

      // Request push permission + register token (called after user logs in)
      window.__registerPushToken = async function(authToken) {
        try {
          const permResult = await PushNotifications.requestPermissions();
          if (permResult.receive !== "granted") return;

          await PushNotifications.register();

          PushNotifications.addListener("registration", async ({ value: deviceToken }) => {
            const platform = window.Capacitor.getPlatform(); // 'ios' or 'android'
            try {
              await fetch("/api/push/register", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + authToken,
                },
                body: JSON.stringify({ token: deviceToken, platform }),
              });
              console.log("[Push] Token registered for", platform);
            } catch (e) {
              console.warn("[Push] Token registration failed:", e.message);
            }
          });

          PushNotifications.addListener("registrationError", (err) => {
            console.warn("[Push] Registration error:", err.error);
          });

          // Handle tapping a notification while app is in background
          PushNotifications.addListener("pushNotificationActionPerformed", (action) => {
            const screen = action.notification?.data?.screen;
            if (screen === "practice") {
              // Scroll to the AI coach tab
              setTimeout(() => {
                const btn = document.querySelector('[data-tab="0"]');
                if (btn) btn.click();
              }, 500);
            }
          });

        } catch (e) {
          console.warn("[Push] Init error:", e.message);
        }
      };

      // Remove token on logout
      window.__unregisterPushToken = async function(authToken) {
        try {
          const { PushNotifications } = window.Capacitor.Plugins;
          const registration = await PushNotifications.getDeliveredNotifications().catch(() => null);
          if (registration?.token) {
            await fetch("/api/push/token", {
              method: "DELETE",
              headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + authToken,
              },
              body: JSON.stringify({ token: registration.token }),
            }).catch(() => {});
          }
        } catch (_) {}
      };
    }
  })();
  </script>

// ─── SPEECH ──────────────────────────────────────────────────────────────────
let voices = [];
let activeLang = "fr-FR";
let activeVoice = "";

// Safe accessor — works on Safari/iPad where speechSynthesis can be tricky
const synth = () => {
  try { return (typeof window !== "undefined" && window.speechSynthesis) ? window.speechSynthesis : null; }
  catch (e) { return null; }
};

const loadVoices = () => {
  const s = synth();
  if (!s) return;
  try { const v = s.getVoices(); if (v && v.length > 0) voices = v; } catch (e) {}
};

const say = (text) => {
  const s = synth();
  if (!s) return;
  try { s.cancel(); } catch (e) {}

  const speak = () => {
    try {
      const fresh = s.getVoices();
      if (fresh && fresh.length > 0) voices = fresh;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = activeLang;
      u.rate = 0.80;
      u.pitch = 1.0;
      u.volume = 1.0;
      if (activeVoice) {
        const v = voices.find(v => v.name === activeVoice);
        if (v) u.voice = v;
      } else {
        const pfx = activeLang.split("-")[0];
        const v = voices.find(v => v.lang === activeLang) || voices.find(v => v.lang.startsWith(pfx));
        if (v) u.voice = v;
      }
      s.speak(u);
    } catch (e) {}
  };

  try { if (s.speaking) { setTimeout(speak, 200); } else { speak(); } }
  catch (e) { speak(); }
};

// Returns true when viewport width is ≤ 640 px. Updates on resize.
function useMobile() {
  const [mobile, setMobile] = React.useState(() => {
    try { return window.innerWidth <= 640; } catch(e) { return false; }
  });
  React.useEffect(() => {
    const fn = () => setMobile(window.innerWidth <= 640);
    window.addEventListener("resize", fn, { passive: true });
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mobile;
}

// ─── FLASHCARD HELPERS ───────────────────────────────────────────────────────
const FC_KEY = "fc_cards_v2";

function fcLoad() {
  try { return JSON.parse(localStorage.getItem(FC_KEY) || "[]"); } catch(e) { return []; }
}
function fcSave(cards) {
  try { localStorage.setItem(FC_KEY, JSON.stringify(cards)); } catch(e) {}
}

function fcAdd(card) {
  // card: { lang, front, back, pronunciation, example }
  const cards = fcLoad();
  // Deduplicate by front+lang
  if (cards.find(c => c.lang === card.lang && c.front.toLowerCase() === card.front.toLowerCase())) return false;
  cards.unshift({
    id:          Date.now(),
    lang:        card.lang || "fr",
    front:       card.front || "",
    back:        card.back  || "",
    pronunciation: card.pronunciation || "",
    example:     card.example || "",
    interval:    1,
    repetitions: 0,
    ease:        2.5,
    next_review: Date.now(),
  });
  fcSave(cards);
  return true;
}

function sm2(card, quality) {
  // quality: 0=Again, 1=Hard, 2=Good, 3=Easy
  let { interval, repetitions, ease } = card;
  if (quality === 0) {
    interval = 1; repetitions = 0;
  } else {
    const q5 = [0, 2, 4, 5][quality]; // map 0-3 → SM2 quality 0-5
    ease = Math.max(1.3, ease + 0.1 - (5 - q5) * (0.08 + (5 - q5) * 0.02));
    if (repetitions === 0) interval = 1;
    else if (repetitions === 1) interval = 6;
    else interval = Math.round(interval * ease);
    if (quality === 3) interval = Math.round(interval * 1.6); // Easy bonus
    repetitions++;
  }
  const next_review = Date.now() + interval * 86400000;
  return { ...card, interval, repetitions, ease, next_review };
}

  if (window.__registerPushToken) {

  }
};
const logout = () => {
  // Unregister push token before clearing session
  if (window.__unregisterPushToken && _authToken) {
    window.__unregisterPushToken(_authToken).catch(() => {});
  }
  _authToken = ""; _authExpiry = null; _userEmail = ""; _userPlan = "";
  try { ["auth_token","auth_expiry","auth_email","auth_plan"].forEach(k => localStorage.removeItem(k)); } catch(e) {}
};

// ── STREAK SYSTEM ─────────────────────────────────────────────────────────────
// Client-side streak tracking (localStorage) + server sync on every new day.
const _streak = {
  get() {
    try {
      return {
        count:   parseInt(localStorage.getItem("streak_count")   || "0"),
        longest: parseInt(localStorage.getItem("streak_longest") || "0"),
        total:   parseInt(localStorage.getItem("streak_total")   || "0"),
        last:    localStorage.getItem("streak_last") || "",
      };
    } catch(e) { return { count:0, longest:0, total:0, last:"" }; }
  },
  log() {
    try {
      const today     = new Date().toDateString();
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      const s = this.get();
      if (s.last === today) return s.count; // Already logged today
      const newCount   = (s.last === yesterday) ? s.count + 1 : 1;
      const newLongest = Math.max(newCount, s.longest);
      localStorage.setItem("streak_count",   String(newCount));
      localStorage.setItem("streak_longest", String(newLongest));
      localStorage.setItem("streak_total",   String(s.total + 1));
      localStorage.setItem("streak_last",    today);
      // Notify App component to refresh streak display
      window.dispatchEvent(new CustomEvent("streak-updated", { detail: { count: newCount } }));
      // Also sync to server (async, non-blocking)
      if (isLoggedIn()) {
        fetch("/api/streaks/log", { method:"POST", headers:{ "Authorization":"Bearer "+getToken() } }).catch(()=>{});
      }
      return newCount;
    } catch(e) { return 0; }
  },
};

async function askClaude(prompt, maxTokens, lang) {
  if (!isLoggedIn()) throw new Error("NOT_LOGGED_IN");
  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + getToken() },
    body: JSON.stringify({ prompt, maxTokens: maxTokens || 1000, language: lang || "fr" }),
  });
  if (res.status === 401) {
    const errData = await res.json().catch(() => ({}));
    logout();
    if (errData.reason === "renewed") {
      window.dispatchEvent(new CustomEvent("session-renewed"));
      throw new Error("RENEWED");
    }
    throw new Error("UNAUTHORIZED");
  }
  if (res.status === 429) {
    const errData = await res.json().catch(() => ({}));
    if (errData.upgrade) {
      window.dispatchEvent(new CustomEvent("show-upgrade", { detail: { reason: "ai_limit" } }));
      throw new Error("FREE_LIMIT");
    }
    throw new Error("RATE_LIMITED");
  }
  if (!res.ok) throw new Error("API_ERROR:" + res.status);
  const data = await res.json();
  // Log a practice session every time AI is successfully called
  _streak.log();
  return data;
}

        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: code.trim().toUpperCase() }),
      });

        setErr(data.error || "Invalid access code.");
        setLoading(false); return;

      saveSession(data.token, data.expiresAt, data.email, data.plan);
      try { if (!localStorage.getItem("_seen_onboard")) localStorage.setItem("_new_login","1"); } catch(e){}
      if (onLogin) onLogin();
    } catch(e) { setErr("Connection error. Please try again."); }
    setLoading(false);
  };

  const signupFree = async () => {
    if (!email.includes("@")) { setErr("Enter a valid email address."); return; }
    setLoading(true); setErr("");
    try {
      const res = await fetch("/api/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email.trim() }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (data.hasPaid) { setMode("code"); setErr("You have an active subscription — use your access code to log in."); setLoading(false); return; }
        setErr(data.error || "Signup failed."); setLoading(false); return;
      }
      saveSession(data.token, data.expiresAt, data.email, data.plan);
      try { if (!localStorage.getItem("_seen_onboard")) localStorage.setItem("_new_login","1"); } catch(e){}
      if (onLogin) onLogin();
    } catch(e) { setErr("Connection error. Please try again."); }
    setLoading(false);
  };

  return (
    <div style={{ fontFamily:"system-ui,-apple-system,sans-serif", background:"#f1f5f9", minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>

        <div style={{ textAlign:"center", marginBottom:20 }}>
          <img src="/logo.svg" alt="Tonge" style={{ height:44, marginBottom:4 }}/>

        {/* Mode switcher */}
        <div style={{ display:"flex", background:"#f1f5f9", borderRadius:10, padding:3, marginBottom:20, gap:3 }}>
          {[["code","Have a code"],["free","Try free"]].map(([m,label]) => (
            <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{
              flex:1, padding:"8px 0", borderRadius:8, border:"none", fontWeight:700, fontSize:13, cursor:"pointer",
              background: mode===m ? "#fff" : "transparent",
              color: mode===m ? "#2563eb" : "#64748b",
              boxShadow: mode===m ? "0 1px 3px rgba(0,0,0,.1)" : "none",

        {checkoutSuccess && (
          <div style={{ background:"#dcfce7", border:"1px solid #86efac", borderRadius:10, padding:"12px 14px", marginBottom:16, textAlign:"center" }}>
            <div style={{ fontWeight:700, color:"#16a34a", fontSize:13, marginBottom:3 }}>Payment successful! 🎉</div>
            <div style={{ color:"#15803d", fontSize:12 }}>Check your email for your access code, then log in above.</div>

        {renewedBanner && (
          <div style={{ background:"#fef9c3", border:"1px solid #f59e0b", borderRadius:10, padding:"12px 14px", marginBottom:16, textAlign:"center" }}>
            <div style={{ fontWeight:700, color:"#92400e", fontSize:13, marginBottom:3 }}>🔄 Subscription renewed!</div>
            <div style={{ color:"#a16207", fontSize:12 }}>Check your email for your new access code.</div>

        {mode === "code" ? (
          <>
            <input value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}
              placeholder="FR-XXXXXXXX" autoFocus
              style={{ width:"100%", padding:"12px 14px", borderRadius:10, border:`2px solid ${err?"#dc2626":"#e2e8f0"}`, fontSize:16, marginBottom:10, boxSizing:"border-box", textAlign:"center", letterSpacing:3, fontWeight:700, textTransform:"uppercase" }}
            />
            {err && <div style={{ color:"#dc2626", fontSize:13, marginBottom:10, textAlign:"center" }}>{err}</div>}
            <button onClick={login} disabled={loading} style={{ width:"100%", padding:13, background:"#2563eb", color:"#fff", border:"none", borderRadius:10, fontWeight:700, fontSize:15, cursor:loading?"default":"pointer", marginBottom:12 }}>
              {loading ? "Verifying..." : "Access App"}
            </button>
            <div style={{ textAlign:"center" }}>
              <a href="/resend-code" style={{ color:"#64748b", fontSize:12, textDecoration:"none" }}>Lost your code? Resend it →</a>

          <>
            <div style={{ background:"#eff6ff", border:"1px solid #bfdbfe", borderRadius:10, padding:"12px 14px", marginBottom:14, fontSize:12, color:"#1d4ed8", lineHeight:1.6 }}>
              <strong>Free plan includes:</strong><br/>
              ✓ All 11 languages · Grammar, vocab &amp; reference guides<br/>
              ✓ 5 AI coach messages per day<br/>
              ✗ Unlimited AI · Streaks sync · Drills · Dialogues
            </div>
            <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&signupFree()}
              placeholder="your@email.com" type="email" autoFocus
              style={{ width:"100%", padding:"12px 14px", borderRadius:10, border:`2px solid ${err?"#dc2626":"#e2e8f0"}`, fontSize:16, marginBottom:10, boxSizing:"border-box" }}
            />
            {err && <div style={{ color:"#dc2626", fontSize:13, marginBottom:10, textAlign:"center" }}>{err}</div>}
            <button onClick={signupFree} disabled={loading} style={{ width:"100%", padding:13, background:"#2563eb", color:"#fff", border:"none", borderRadius:10, fontWeight:700, fontSize:15, cursor:loading?"default":"pointer", marginBottom:12 }}>

            ✨ Upgrade to Premium — from $9/month

}

function AICoach({ tLang, rLangs }) {
  const [type, setType]       = useState(null);
  const [ex, setEx]           = useState(null);
  const [answer, setAnswer]   = useState("");
  const [fb, setFb]           = useState(null);
  const [loading, setLoading] = useState(false);
  const [picked, setPicked]   = useState(null);

  const tName    = TARGETS[tLang]?.name || "French";
  const refNames = rLangs.length > 0 ? rLangs.map(l => REFS[l]?.name || l).join(" and ") : "English";
  const synergy  = TARGETS[tLang]?.synergy || [];

  const generate = async (exType) => {
    setLoading(true);
    setEx(null);
    setFb(null);
    setAnswer("");
    setPicked(null);
    setType(exType);

    // "write" exercise doesn't need a Claude call to set up
    if (exType === "write") {
      setEx({ instruction: `Write anything in ${tName} — a sentence, a few lines, or a short paragraph on any topic. Your coach will analyse your grammar, vocabulary, and style, and explain every correction clearly.` });
      setLoading(false);
      return;
    }

    const prompts = {
      word: `You are a ${tName} language coach for speakers of ${refNames}. Return ONLY a valid JSON object with no extra text: {"word":"a useful ${tName} word","pronunciation_guide":"how to say it using simple English phonetics","meaning_en":"English meaning","meaning_ref":"meaning in ${refNames}","example":"${tName} example sentence","example_en":"English translation","memory_tip":"how to remember it","ref_note":"connection or difference vs ${refNames}"}`,
      fill: `You are a ${tName} teacher for ${refNames} speakers. Return ONLY a valid JSON object: {"sentence":"${tName} sentence with [BLANK] where a word is missing","full_translation":"English translation of the complete sentence","answer":"the missing word","hint":"grammatical hint","why":"why this is the correct answer"}`,
      trans: `You are a ${tName} teacher. Give a ${refNames} sentence for the student to translate into ${tName}. Return ONLY a valid JSON object: {"source":"sentence in ${refNames}","answer":"correct ${tName} translation","grammar_focus":"key grammar point","tip":"helpful hint without giving away the answer"}`,
      opinion: `You are a ${tName} conversation coach. Give the student a topic to discuss in ${tName}. Return ONLY a valid JSON object: {"topic":"interesting discussion topic","question":"specific question to answer in ${tName}","starter":"opening phrase in ${tName} to get them going","vocab":[{"word":"","meaning":""}],"target":"3 to 5 sentences"}`,
      quiz: `Create a ${tName} grammar or vocabulary multiple-choice question for a ${refNames} speaker. Return ONLY a valid JSON object: {"question":"","A":"option A","B":"option B","C":"option C","D":"option D","correct":"A","why":"explanation of why the answer is correct","concept":"grammar concept being tested"}`,
      convo: `Create a ${tName} role-play scenario. Return ONLY a valid JSON object: {"situation":"brief description of the scenario","opener":"what the other person says in ${tName}","opener_en":"English translation","guidance":"what kind of response to give","phrases":["useful ${tName} phrase 1","useful ${tName} phrase 2"]}`,
    };

    try {
      const result = await askClaude(prompts[exType], 1000, tLang);
      setEx(result);
    } catch (err) {
      if (err.message !== "FREE_LIMIT") {
        setEx({ error: "Could not generate the exercise. Please check your connection and try again." });
      }
    }
    setLoading(false);
  };

  const submit = async () => {
    if (!answer.trim()) return;
    setLoading(true);
    const context = JSON.stringify(ex);

    let prompt = "";
    if (type === "write" || type === "opinion") {
      prompt = `You are an encouraging ${tName} language coach. The student wrote: "${answer}". Exercise context: ${context}. Evaluate their ${tName}. Return ONLY a valid JSON object: {"corrected":"improved version of their text","score":"A/B/C/D","praise":"specific thing they did well","fixes":[{"wrong":"","right":"","note":""}],"encouragement":"warm motivating message","tip":"one concrete next step"}`;
    } else if (type === "fill" || type === "trans") {
      prompt = `You are a ${tName} teacher. Exercise: ${context}. Student answered: "${answer}". Return ONLY a valid JSON object: {"correct":true,"student_answer":"${answer.replace(/"/g, "'")}","ideal_answer":"","explanation":"clear encouraging explanation","grammar_note":"key rule to remember","ref_connection":"how this relates to ${refNames} if helpful"}`;
    } else if (type === "convo") {
      prompt = `You are a ${tName} conversation coach. Scenario: ${context}. Student said in ${tName}: "${answer.replace(/"/g, "'")}". Continue the conversation and give feedback. Return ONLY a valid JSON object: {"reply":"your reply in ${tName}","reply_en":"English translation","feedback":"assessment of their response","fixes":[{"wrong":"","right":"","note":""}],"next_line":"a follow-up line the student could say to continue"}`;
    }

    try {
      setFb(await askClaude(prompt, 1000, tLang));
    } catch (err) {
      if (err.message !== "FREE_LIMIT") {
        setFb({ error: "Could not evaluate your answer. Please try again." });
      }
    }
    setLoading(false);
  };

  const scoreColor = { A: C.green, B: C.teal, C: C.amber, D: C.red };

  return (
    <div>
      <Heading title="AI Language Coach" sub={`Personalized ${tName} exercises for ${refNames} speakers`} color={C.purple} />

      {/* Synergy panel */}
      {synergy.length > 0 && (
        <Box accent={C.purple + "30"}>
          <div style={{ fontWeight: 800, color: C.purple, fontSize: 13, marginBottom: 8 }}>Your Language Synergy</div>
          <div style={{ color: C.mid, fontSize: 13, marginBottom: 10 }}>
            {tName} is related to these languages. Learning them together multiplies your progress.
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
            {synergy.map(s => TARGETS[s] && (
              <div key={s} style={{ background: C.purple + "10", border: `1px solid ${C.purple}28`, borderRadius: 10, padding: "7px 12px" }}>
                <div style={{ fontWeight: 700, color: C.purple, fontSize: 13 }}>{TARGETS[s].flag} {TARGETS[s].name}</div>
                <div style={{ color: C.muted, fontSize: 11, marginTop: 2 }}>{SYNERGY_DESC[tLang]?.[s] || "Related language"}</div>
              </div>
            ))}
          </div>
          {rLangs.some(l => synergy.includes(l)) && (
            <Info text={`You already speak ${rLangs.filter(l => synergy.includes(l)).map(l => REFS[l]?.name).join(" and ")} — that gives you a head start in ${tName}. Many patterns will feel familiar.`} color={C.green} />
          )}
        </Box>
      )}

      {/* Contextual help */}
      <div style={{ background: C.purple + "08", border: `1px solid ${C.purple}20`, borderRadius: 10, padding: "10px 14px", marginBottom: 14, fontSize: 12, color: C.mid, lineHeight: 1.6 }}>
        <strong style={{ color: C.purple }}>How it works:</strong> Pick an exercise below — the AI generates a fresh personalised task for {tName}. Type your answer, get instant feedback with grammar notes and corrections. For best results, practise a little every day rather than long sessions.
      </div>

      {/* Quick-start prompts */}
      <div style={{ fontWeight: 700, color: C.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
        Quick start
      </div>
      <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 14 }}>
        {[
          { label: "Teach me a word", id: "word" },
          { label: "Quiz me", id: "quiz" },
          { label: "Let's role-play", id: "convo" },
          { label: "I'll write freely", id: "write" },
        ].map(q => (
          <button key={q.id} onClick={() => generate(q.id)} style={{
            padding: "7px 14px", borderRadius: 20, border: `1px solid ${C.purple}40`,
            background: C.purple + "10", color: C.purple, fontSize: 12, fontWeight: 700,
            cursor: "pointer",
          }}>{q.label}</button>
        ))}
      </div>

      {/* Exercise type grid */}
      <div style={{ fontWeight: 700, color: C.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
        All exercises
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
        {EXERCISE_TYPES.map(et => (
          <button key={et.id} onClick={() => generate(et.id)} style={{
            background: type === et.id ? C.purple : C.card,
            border: `2px solid ${type === et.id ? C.purple : C.bdr}`,
            borderRadius: 11, padding: "10px 13px", textAlign: "left",
            cursor: "pointer", boxShadow: C.sh,
          }}>
            <div style={{ fontWeight: 800, color: type === et.id ? "#fff" : C.text, fontSize: 13 }}>{et.label}</div>
            <div style={{ color: type === et.id ? "rgba(255,255,255,.7)" : C.muted, fontSize: 11, marginTop: 3 }}>{et.desc}</div>
          </button>
        ))}
      </div>

      {loading && (
        <Box>
          <div style={{ textAlign: "center", padding: "24px 0", color: C.muted }}>
            <div style={{ fontSize: 13 }}>Preparing your exercise...</div>
          </div>
        </Box>
      )}

      {/* Exercise content */}
      {!loading && ex && !ex.error && (
        <Box accent={C.purple + "30"}>
          {/* NEW WORD */}
          {type === "word" && (
            <div>
              <Tag label="New Word" color={C.purple} />
              <div style={{ margin: "13px 0 6px", display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontWeight: 900, fontSize: 32, color: C.blue }}>{ex.word}</span>
                <PlayBtn text={ex.word || ""} />
              </div>
              {ex.pronunciation_guide && (
                <div style={{ color: C.teal, fontSize: 13, marginBottom: 10 }}>
                  Pronunciation: <strong>{ex.pronunciation_guide}</strong>
                </div>
              )}
              {ex.meaning_en && <Info text={`🇬🇧 ${ex.meaning_en}${ex.meaning_ref ? " · " + ex.meaning_ref : ""}`} color={C.blue} />}
              {ex.example && (
                <div style={{ background: C.bg, borderRadius: 10, padding: "10px 13px", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontWeight: 700, color: C.blue, fontSize: 15 }}>{ex.example}</span>
                    <PlayBtn text={ex.example} />
                  </div>
                  {ex.example_en && <div style={{ color: C.mid, fontSize: 13 }}>{ex.example_en}</div>}
                </div>
              )}
              {ex.memory_tip && <Info text={"Memory tip: " + ex.memory_tip} color={C.green} />}
              {ex.ref_note && <Info text={ex.ref_note} color={C.orange} />}
              <SaveToFlashcardsBtn card={{ lang: tLang, front: ex.word, back: ex.meaning_en, pronunciation: ex.pronunciation_guide, example: ex.example }} />
              <button onClick={() => generate("word")} style={{ width: "100%", padding: 12, background: C.purple, color: "#fff", border: "none", borderRadius: 9, fontWeight: 700, cursor: "pointer", marginTop: 6 }}>
                Next Word
              </button>
            </div>
          )}

          {/* FILL THE GAP */}
          {type === "fill" && (
            <div>
              <Tag label="Fill the Gap" color={C.blue} />
              <div style={{ margin: "13px 0 5px", fontWeight: 800, fontSize: 18, color: C.text }}>{ex.sentence}</div>
              {ex.full_translation && <div style={{ color: C.muted, fontSize: 13, marginBottom: 12 }}>{ex.full_translation}</div>}
              {ex.hint && !fb && <Info text={"Hint: " + ex.hint} color={C.amber} />}
              {!fb && (
                <>
                  <input
                    value={answer}
                    onChange={e => setAnswer(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && submit()}
                    placeholder="Type the missing word..."
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 9, border: `2px solid ${C.bdr}`, fontSize: 15, marginBottom: 10, boxSizing: "border-box" }}
                  />
                  <button onClick={submit} style={{ width: "100%", padding: 12, background: C.blue, color: "#fff", border: "none", borderRadius: 9, fontWeight: 700, cursor: "pointer" }}>
                    Check Answer
                  </button>
                </>
              )}
            </div>
          )}

          {/* TRANSLATE */}
          {type === "trans" && (
            <div>
              <Tag label="Translate" color={C.green} />
              <div style={{ margin: "13px 0 5px", fontWeight: 800, fontSize: 18, color: C.text }}>{ex.source}</div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 10 }}>Translate into {tName}</div>
              {ex.grammar_focus && <Tag label={ex.grammar_focus} color={C.teal} sm />}
              <div style={{ marginBottom: 10 }} />
              {ex.tip && !fb && <Info text={"Tip: " + ex.tip} color={C.amber} />}
              {!fb && (
                <>
                  <textarea
                    value={answer}
                    onChange={e => setAnswer(e.target.value)}
                    placeholder={`Write in ${tName}...`}
                    rows={2}
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 9, border: `2px solid ${C.bdr}`, fontSize: 15, marginBottom: 10, resize: "vertical", boxSizing: "border-box" }}
                  />
                  <button onClick={submit} style={{ width: "100%", padding: 12, background: C.green, color: "#fff", border: "none", borderRadius: 9, fontWeight: 700, cursor: "pointer" }}>
                    Check
                  </button>
                </>
              )}
            </div>
          )}

          {/* OPINION */}
          {type === "opinion" && (
            <div>
              <Tag label="Give Opinion" color={C.orange} />
              {ex.topic && <div style={{ margin: "12px 0 5px", fontWeight: 800, fontSize: 17, color: C.text }}>{ex.topic}</div>}
              {ex.question && <div style={{ color: C.mid, fontSize: 14, marginBottom: 10 }}>{ex.question}</div>}
              {ex.starter && (
                <div style={{ background: C.bg, borderRadius: 9, padding: "9px 12px", marginBottom: 10 }}>
                  <div style={{ color: C.muted, fontSize: 11, marginBottom: 5 }}>Starter phrase:</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontWeight: 700, color: C.blue }}>{ex.starter}</span>
                    <PlayBtn text={ex.starter} />
                  </div>
                </div>
              )}
              {Array.isArray(ex.vocab) && ex.vocab.length > 0 && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ color: C.muted, fontSize: 11, marginBottom: 6 }}>Useful words:</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {ex.vocab.map((v, i) => {
                      const word = typeof v === "string" ? v : (v.word || "");
                      const meaning = typeof v === "object" ? (v.meaning || "") : "";
                      return (
                        <div key={i} style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 8, padding: "4px 10px", display: "flex", alignItems: "center", gap: 6 }}>
                          <PlayBtn text={word} sm />
                          <span style={{ fontWeight: 700, color: C.blue, fontSize: 13 }}>{word}</span>
                          {meaning && <span style={{ color: C.muted, fontSize: 11 }}>— {meaning}</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {!fb && (
                <>
                  <textarea
                    value={answer}
                    onChange={e => setAnswer(e.target.value)}
                    placeholder={`Write your opinion in ${tName}...`}
                    rows={4}
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 9, border: `2px solid ${C.bdr}`, fontSize: 15, marginBottom: 10, resize: "vertical", boxSizing: "border-box" }}
                  />
                  <button onClick={submit} style={{ width: "100%", padding: 12, background: C.orange, color: "#fff", border: "none", borderRadius: 9, fontWeight: 700, cursor: "pointer" }}>
                    Get Feedback
                  </button>
                </>
              )}
            </div>
          )}

          {/* FREE WRITING */}
          {type === "write" && (
            <div>
              <Tag label="Free Writing" color={C.orange} />
              <div style={{ margin: "12px 0 10px", color: C.mid, fontSize: 14 }}>{ex.instruction}</div>
              {!fb && (
                <>
                  <textarea
                    value={answer}
                    onChange={e => setAnswer(e.target.value)}
                    placeholder={`Write in ${tName}...`}
                    rows={5}
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 9, border: `2px solid ${C.bdr}`, fontSize: 15, marginBottom: 10, resize: "vertical", boxSizing: "border-box" }}
                  />
                  <button onClick={submit} style={{ width: "100%", padding: 12, background: C.orange, color: "#fff", border: "none", borderRadius: 9, fontWeight: 700, cursor: "pointer" }}>
                    Get Feedback
                  </button>
                </>
              )}
            </div>
          )}

          {/* QUIZ */}
          {type === "quiz" && ex.question && (
            <div>
              <Tag label="Mini Quiz" color={C.red} />
              <div style={{ margin: "13px 0 14px", fontWeight: 800, fontSize: 17, color: C.text }}>{ex.question}</div>
              {["A","B","C","D"].map(letter => {
                const optText = ex[letter];
                if (!optText) return null;
                const isCorrect = letter === ex.correct;
                const isPicked  = picked === letter;
                const done      = picked !== null;
                let bg = C.card, bc = C.bdr, tc = C.text;
                if (done && isCorrect) { bg = C.green + "15"; bc = C.green; tc = C.green; }
                else if (done && isPicked && !isCorrect) { bg = C.red + "15"; bc = C.red; tc = C.red; }
                return (
                  <button
                    key={letter}
                    onClick={() => { if (!picked) setPicked(letter); }}
                    disabled={!!picked}
                    style={{
                      width: "100%", background: bg, border: `2px solid ${bc}`, borderRadius: 10,
                      padding: "11px 14px", marginBottom: 8, textAlign: "left",
                      cursor: picked ? "default" : "pointer",
                      color: tc, fontWeight: (isPicked || isCorrect) && done ? 700 : 400, fontSize: 14,
                    }}>
                    {letter}) {optText}
                  </button>
                );
              })}
              {picked && (
                <>
                  {ex.why && <Info text={ex.why} color={picked === ex.correct ? C.green : C.red} />}
                  {ex.concept && <Info text={"Concept: " + ex.concept} color={C.teal} />}
                  <button onClick={() => generate("quiz")} style={{ width: "100%", padding: 12, background: C.red, color: "#fff", border: "none", borderRadius: 9, fontWeight: 700, cursor: "pointer" }}>
                    Next Question
                  </button>
                </>
              )}
            </div>
          )}

          {/* ROLE PLAY */}
          {type === "convo" && (
            <div>
              <Tag label="Role Play" color={C.teal} />
              {ex.situation && <div style={{ margin: "12px 0 8px", color: C.mid, fontSize: 14 }}>{ex.situation}</div>}
              {ex.opener && (
                <div style={{ background: C.bg, borderRadius: 10, padding: "10px 13px", marginBottom: 12 }}>
                  <div style={{ color: C.muted, fontSize: 11, marginBottom: 5 }}>They say:</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontWeight: 700, color: C.blue, fontSize: 16 }}>{ex.opener}</span>
                    <PlayBtn text={ex.opener} />
                  </div>
                  {ex.opener_en && <div style={{ color: C.mid, fontSize: 13 }}>{ex.opener_en}</div>}
                </div>
              )}
              {Array.isArray(ex.phrases) && ex.phrases.length > 0 && (
                <div style={{ marginBottom: 10 }}>
                  <div style={{ color: C.muted, fontSize: 11, marginBottom: 6 }}>Useful phrases:</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {ex.phrases.map((p, i) => typeof p === "string" && (
                      <div key={i} style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 8, padding: "4px 10px", display: "flex", alignItems: "center", gap: 6 }}>
                        <PlayBtn text={p} sm />
                        <span style={{ fontWeight: 700, color: C.teal, fontSize: 12 }}>{p}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {ex.guidance && <Info text={ex.guidance} color={C.amber} />}
              {!fb && (
                <>
                  <textarea
                    value={answer}
                    onChange={e => setAnswer(e.target.value)}
                    placeholder={`Respond in ${tName}...`}
                    rows={3}
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 9, border: `2px solid ${C.bdr}`, fontSize: 15, marginBottom: 10, resize: "vertical", boxSizing: "border-box" }}
                  />
                  <button onClick={submit} style={{ width: "100%", padding: 12, background: C.teal, color: "#fff", border: "none", borderRadius: 9, fontWeight: 700, cursor: "pointer" }}>
                    Send Reply
                  </button>
                </>
              )}
            </div>
          )}
        </Box>
      )}

      {ex && ex.error && <Info text={ex.error} color={C.red} />}

      {/* Feedback */}
      {!loading && fb && !fb.error && (
        <Box accent={C.green + "40"}>
          <div style={{ fontWeight: 800, color: C.green, fontSize: 14, marginBottom: 12 }}>Coach Feedback</div>

          {fb.score && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
              <div style={{
                width: 46, height: 46, borderRadius: "50%",
                background: (scoreColor[fb.score] || C.blue) + "18",
                border: `3px solid ${scoreColor[fb.score] || C.blue}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontWeight: 900, fontSize: 20, color: scoreColor[fb.score] || C.blue,
              }}>{fb.score}</div>
              {fb.praise && <div style={{ color: C.green, fontSize: 13, flex: 1 }}>{fb.praise}</div>}
            </div>
          )}

          {fb.corrected && (
            <div style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 10, padding: "10px 13px", marginBottom: 10 }}>
              <div style={{ color: C.muted, fontSize: 11, marginBottom: 5 }}>Improved version:</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <span style={{ fontWeight: 700, color: C.blue, fontSize: 14 }}>{fb.corrected}</span>
                <PlayBtn text={fb.corrected} />
              </div>
            </div>
          )}

          {fb.correct !== undefined && (
            <Info text={fb.correct ? "Correct!" : "Not quite — see the explanation below."} color={fb.correct ? C.green : C.red} />
          )}

          {fb.ideal_answer && (
            <div style={{ background: C.bg, borderRadius: 10, padding: "9px 13px", marginBottom: 10 }}>
              <div style={{ color: C.muted, fontSize: 11, marginBottom: 4 }}>Correct answer:</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontWeight: 700, color: C.blue, fontSize: 15 }}>{fb.ideal_answer}</span>
                <PlayBtn text={fb.ideal_answer} />
              </div>
            </div>
          )}

          {Array.isArray(fb.fixes) && fb.fixes.map((fix, i) => (
            fix.wrong && (
              <div key={i} style={{ background: C.bg, borderRadius: 9, padding: "9px 12px", marginBottom: 7, borderLeft: `3px solid ${C.red}` }}>
                <div style={{ fontSize: 13 }}>
                  <span style={{ color: C.red, textDecoration: "line-through" }}>{fix.wrong}</span>
                  <span style={{ color: C.muted }}> → </span>
                  <span style={{ color: C.green, fontWeight: 700 }}>{fix.right}</span>
                </div>
                {fix.note && <div style={{ color: C.muted, fontSize: 12, marginTop: 3 }}>{fix.note}</div>}
              </div>
            )
          ))}

          {fb.explanation && <Info text={fb.explanation} color={C.blue} />}
          {fb.grammar_note && <Info text={"Grammar: " + fb.grammar_note} color={C.teal} />}
          {fb.ref_connection && <Info text={fb.ref_connection} color={C.orange} />}

          {fb.reply && (
            <div style={{ background: C.bg, borderRadius: 10, padding: "10px 13px", marginBottom: 10 }}>
              <div style={{ color: C.muted, fontSize: 11, marginBottom: 5 }}>They reply:</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ fontWeight: 700, color: C.blue, fontSize: 15 }}>{fb.reply}</span>
                <PlayBtn text={fb.reply} />
              </div>
              {fb.reply_en && <div style={{ color: C.mid, fontSize: 13 }}>{fb.reply_en}</div>}
            </div>
          )}
          {fb.feedback && <Info text={fb.feedback} color={C.green} />}
          {fb.next_line && <Info text={"What to say next: " + fb.next_line} color={C.teal} />}

          {fb.encouragement && (
            <div style={{ background: C.purple + "10", border: `1px solid ${C.purple}28`, borderRadius: 9, padding: "10px 13px" }}>
              <div style={{ color: C.purple, fontSize: 13, marginBottom: fb.tip ? 6 : 0 }}>{fb.encouragement}</div>
              {fb.tip && <div style={{ color: C.muted, fontSize: 12 }}>Next focus: {fb.tip}</div>}
            </div>
          )}

          <button
            onClick={() => { setFb(null); setAnswer(""); setEx(null); setType(null); }}
            style={{ width: "100%", padding: 12, background: C.purple, color: "#fff", border: "none", borderRadius: 9, fontWeight: 700, cursor: "pointer", marginTop: 10 }}>
            New Exercise
          </button>
        </Box>
      )}

      {fb && fb.error && <Info text={fb.error} color={C.red} />}
    </div>
  );
}

// ─── AI TAB CONTENT (all non-built languages) ────────────────────────────────
function AITabContent({ tLang, tabName, color }) {
  const col    = color || C.blue;
  const tName  = TARGETS[tLang]?.name || tLang;
  const tabLabels = { grammar:"Grammar Guide", cheatsheet:"Quick Reference", structures:"Sentence Structures", vocab:"Vocabulary", dialogues:"Dialogues" };
  const tabLabel  = tabLabels[tabName] || tabName;

  const [content,  setContent]  = useState(null);
  const [loading,  setLoading]  = useState(true);
  const [err,      setErr]      = useState("");
  const [open,     setOpen]     = useState(null);
  const [genAt,    setGenAt]    = useState("");
  const [dIdx,     setDIdx]     = useState(0);

  // Auto-fetch on mount or when language changes
  useEffect(() => {
    let cancelled = false;
    setLoading(true); setErr(""); setContent(null); setOpen(null); setDIdx(0);

    fetch(`/api/content/${tLang}/${tabName}`, {
      headers: { "Authorization": "Bearer " + getToken() },
    })
      .then(r => {
        if (!r.ok) throw new Error(r.status === 503 ? "Content is being generated — check back in 30 seconds." : "Failed to load content.");
        return r.json();
      })
      .then(d => {
        if (!cancelled) { setContent(d.content); setGenAt(d.generated_at || ""); }
      })
      .catch(e => { if (!cancelled) setErr(e.message); })
      .finally(() => { if (!cancelled) setLoading(false); });

    return () => { cancelled = true; };
  }, [tLang, tabName]);

  if (loading) {
    return (
      <div style={{ textAlign:"center", padding:"50px 20px" }}>
        <div style={{ fontSize:50, marginBottom:14 }}>{TARGETS[tLang]?.flag}</div>
        <div style={{ fontWeight:800, fontSize:16, color:C.text, marginBottom:8 }}>Loading {tName} {tabLabel}…</div>
        <div style={{ color:C.muted, fontSize:13 }}>Fetching from server cache</div>
      </div>
    );
  }

  if (err || !content) {
    return (
      <div>
        <Heading title={tabLabel} color={col} />
        <div style={{ background:C.card, borderRadius:16, padding:"28px 20px", textAlign:"center", boxShadow:C.sh, border:`1px solid ${C.bdr}` }}>
          <div style={{ fontSize:48, marginBottom:12 }}>{TARGETS[tLang]?.flag}</div>
          <div style={{ fontWeight:900, fontSize:17, color:C.text, marginBottom:8 }}>{tName} {tabLabel}</div>
          <div style={{ color:C.muted, fontSize:13, lineHeight:1.7, marginBottom:20 }}>
            {err || "Content is being prepared. It will be ready shortly."}
          </div>
          <button onClick={() => { setLoading(true); setErr(""); fetch(`/api/content/${tLang}/${tabName}`, { headers:{"Authorization":"Bearer "+getToken()} }).then(r=>r.json()).then(d=>{setContent(d.content);setLoading(false);}).catch(e=>{setErr(e.message);setLoading(false);}); }}
            style={{ padding:"11px 28px", background:col, color:"#fff", border:"none", borderRadius:10, fontWeight:700, fontSize:14, cursor:"pointer" }}>
            Try Again
          </button>
        </div>
        <div style={{ marginTop:14 }}>
          <Info text={`The AI Coach tab has live ${tName} exercises — fill-ins, translations, role-play, and vocabulary — ready right now.`} color={C.purple} />
        </div>
      </div>
    );
  }

  // ── Grammar rendering ────────────────────────────────────────────────────────
  if (tabName === "grammar") {
    return (
      <div>
        <Heading title={`${tName} Grammar Guide`} sub={`8 essential topics — tap any to expand.${genAt ? ` Updated ${new Date(genAt).toLocaleDateString()}.` : ""}`} color={col} />
        {(content.sections || []).map((s, i) => {
          const isOpen = open === i;
          const levelColor = s.level === "Beginner" ? C.green : s.level === "Advanced" ? C.red : C.purple;
          return (
            <div key={i} style={{ background:C.card, border:`2px solid ${isOpen?col:C.bdr}`, borderRadius:13, marginBottom:10, boxShadow:C.sh, overflow:"hidden" }}>
              <div onClick={() => setOpen(isOpen ? null : i)} style={{ padding:"13px 16px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", gap:10 }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:4 }}>
                    <span style={{ fontWeight:900, color:col, fontSize:15 }}>{s.title}</span>
                    <span style={{ background:levelColor+"15", color:levelColor, border:`1px solid ${levelColor}30`, borderRadius:20, fontSize:9, fontWeight:700, padding:"1px 8px" }}>{s.level || "Beginner"}</span>
                  </div>
                  {!isOpen && s.rule && <div style={{ color:C.muted, fontSize:12, fontStyle:"italic" }}>{s.rule.substring(0,85)}{s.rule.length > 85 ? "…" : ""}</div>}

                  <div style={{ background: C.card, border: `1px solid ${C.bdr}`, borderRadius: 10, overflow: "hidden", minWidth: 320 }}>

  "3-2": {

    explanation:"Relative pronouns connect two clauses about the same noun, avoiding repetition. QUI = subject of the relative clause — it IS doing the action (replaces a subject). QUE/QU' = object of the relative clause — the action is done TO it (replaces an object). DONT = replaces 'de + noun' — used after verbs/expressions that take de: parler de, avoir besoin de, avoir peur de, se souvenir de, être content de. OÙ = place or time. CE QUI = 'what' as subject (undefined thing). CE QUE = 'what' as object.",
    ref:"Spanish: que (subject AND object), quien/quienes (who — for people), cuyo (whose), donde (where). French qui and que BOTH correspond to Spanish 'que' — but they depend on grammatical role (subject = qui, object = que). Dont has no clean Spanish equivalent — Spanish restructures the sentence instead: le film dont je parle = la película de la que hablo.",

  "3-4": {

    ref:"Spanish: más/menos/tan + adj + que (comparative). El/la más/menos (superlative). French: plus/moins/aussi + adj + que. Le/la plus/moins. Identical logic. Irregulars: bueno→mejor = bon→meilleur. Malo→peor = mauvais→pire. Bien→mejor (adverb) = bien→mieux. These parallels are direct and very helpful.",

function GrammarTopic({ lv, tp }) {
  const key = lv + "-" + tp;
  const data = GRAMMAR_DATA[key];
  if (!data) return (
    <div style={{ textAlign:"center", color:C.muted, fontSize:13, padding:"30px 0" }}>
      Select a topic above to begin.
    </div>
  );
  return <GrammarExpanded data={data} />;
}

function GrammarExpanded({ data }) {
  const [showExp, setShowExp] = useState(false);
  const col = data.col;

  return (
    <div>
      {/* Reference language panel — always visible */}
      <div style={{ background:col+"08", border:`1px solid ${col}22`, borderLeft:`3px solid ${col}`, borderRadius:9, padding:"12px 14px", marginBottom:14 }}>
        <div style={{ fontWeight:700, color:col, fontSize:10, textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>
          How this compares to Spanish, Italian, and Portuguese
        </div>
        <div style={{ color:C.mid, fontSize:13, lineHeight:1.65 }}>{data.ref}</div>
      </div>

      {/* Table */}
      <div className="scroll-x" style={{ borderRadius:10, marginBottom:14, boxShadow:C.sh }}>
        <div style={{ background:C.card, border:`1px solid ${C.bdr}`, borderRadius:10, overflow:"hidden", minWidth:320 }}>
          {/* Column headers */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:6, padding:"7px 12px", background:col+"18", borderBottom:`2px solid ${col}30` }}>
            {data.headers.map((h,i) => (
              <span key={i} style={{ color:col, fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:0.8 }}>{h}</span>
            ))}
          </div>
          {/* Data rows */}
          {data.table.map((row, i) => (
            <div key={i} style={{
              display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr",
              gap:6, padding:"9px 12px",
              background: i%2===0 ? C.card : C.soft,
              borderBottom: i<data.table.length-1 ? `1px solid ${C.bdr}` : "none",
              alignItems:"center",
            }}>
              {[0,1,2,3].map(ci => {
                const isPlayCol = row.speak && (row.speakCol !== undefined ? row.speakCol : 1) === ci;
                const textStyle = ci===1
                  ? { fontWeight:800, color:col, fontSize:13 }
                  : ci===3
                    ? { color:C.orange, fontSize:10 }
                    : ci===0
                      ? { color:C.muted, fontSize:11 }
                      : { color:C.mid, fontSize:11, lineHeight:1.4 };
                return (
                  <div key={ci} style={{ display:"flex", alignItems:"center", gap:5 }}>
                    <span style={textStyle}>{row.cells[ci]}</span>
                    {isPlayCol && <PlayBtn text={row.speak} sm />}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* Full explanation — collapsible */}
      <div
        onClick={() => setShowExp(!showExp)}
        style={{ background:C.bg, border:`1px solid ${C.bdr}`, borderRadius:9, padding:"10px 14px", marginBottom:showExp?0:14, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontWeight:700, color:C.mid, fontSize:13 }}>Full explanation of this rule</span>
        <span style={{ color:col, fontSize:16, fontWeight:700 }}>{showExp ? "−" : "+"}</span>
      </div>
      {showExp && (
        <div style={{ background:col+"06", border:`1px solid ${col}20`, borderLeft:`3px solid ${col}`, borderRadius:8, borderTopLeftRadius:0, borderTopRightRadius:0, padding:"13px 15px", marginBottom:14 }}>
          <div style={{ color:C.mid, fontSize:13, lineHeight:1.75 }}>{data.explanation}</div>
        </div>
      )}

      {/* Real-life examples — always visible */}
      <div style={{ fontWeight:700, color:C.muted, fontSize:10, textTransform:"uppercase", letterSpacing:1, marginBottom:9 }}>
        Real-life examples — tap ▶ to hear
      </div>
      {data.examples.map(([fr, en, es], i) => (
        <div key={i} style={{ background:C.bg, border:`1px solid ${C.bdr}`, borderRadius:10, padding:"10px 13px", marginBottom:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:4, flexWrap:"wrap" }}>
            <span style={{ fontWeight:800, color:C.blue, fontSize:15 }}>{fr}</span>
            <PlayBtn text={fr} />
          </div>
          <div style={{ color:C.mid, fontSize:12, marginBottom:es?3:0 }}>🇬🇧 {en}</div>
          {es && <div style={{ color:C.orange, fontSize:12 }}>🇪🇸 {es}</div>}
        </div>
      ))}
    </div>
  );
}

function Grammar({ tLang, rLangs }) {
  const [lv, setLv] = useState(0);
  const [tp, setTp] = useState(0);

  if (!TARGETS[tLang]?.built) {
    return <AITabContent tLang={tLang} tabName="grammar" color={C.blue} />;
  }

  const levels = [
    { label:"L1 — Foundation", col:C.blue   },
    { label:"L2 — Building",   col:C.green  },
    { label:"L3 — Tenses",     col:C.purple },
    { label:"L4 — Advanced",   col:C.red    },
  ];
  const topicNames = [
    ["Pronouns","Être","Avoir","Articles","-ER Verbs","Negation","Questions","Gender"],
    ["-IR/-RE Verbs","Irregular Verbs 1","Irregular Verbs 2","Adjectives","Possessives","Demonstratives","Object Pronouns"],
    ["PC with Avoir","PC with Être","Imparfait","Near Future","Simple Future","Conditional"],
    ["Subjunctive","Reflexive Verbs","Relative Pronouns","Y & En","Comparatives","Complex Negation"],
  ];

  const col = levels[lv].col;

  return (
    <div>
      <div style={{ marginBottom:16 }}>
        <div style={{ fontWeight:900, fontSize:19, color:C.blue }}>Full Grammar — 4 Levels, 27 Topics</div>
        <div style={{ color:C.muted, fontSize:12, marginTop:4 }}>Every topic has: reference language comparison · full table with correct audio · explanation · 6 real examples with voice.</div>
      </div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:13 }}>
        {levels.map((l,i) => (
          <button key={i} onClick={()=>{ setLv(i); setTp(0); }} style={{
            padding:"7px 15px", borderRadius:22, border:`2px solid ${lv===i?l.col:C.bdr}`,
            cursor:"pointer", fontSize:11, fontWeight:800,
            background:lv===i?l.col:C.card, color:lv===i?"#fff":C.muted,
          }}>{l.label}</button>

      </div>
      <Tabs items={topicNames[lv]} current={tp} onChange={setTp} color={col} />
      <GrammarTopic lv={lv} tp={tp} />
    </div>
  );
}

function Structures({ tLang, rLangs }) {
  const [open, setOpen] = useState(null);
  if (!TARGETS[tLang]?.built) {
    return <AITabContent tLang={tLang} tabName="structures" color={C.blue} />;
  }
  return (
    <div>
      <Heading title="Core Sentence Structures" sub="14 essential patterns. Each one with full explanation, real-life examples, and voice." color={C.blue} />
      <Info text="Don't translate word by word. Learn each pattern as a whole unit — the same way you learned patterns in Spanish or English without thinking about grammar. After studying a pattern, try it in the AI Coach → Free Writing exercise." color={C.teal} />
      {STRUCTURES.map((s, i) => {
        const isOpen = open === i;
        return (
          <div key={i} style={{ background: C.card, border: `2px solid ${isOpen ? s.color : C.bdr}`, borderRadius: 13, marginBottom: 10, boxShadow: C.sh, overflow: "hidden" }}>
            {/* Header — always visible */}
            <div onClick={() => setOpen(isOpen ? null : i)}
              style={{ padding: "13px 16px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                  <span style={{ background: s.color + "18", color: s.color, border: `1px solid ${s.color}30`, borderRadius: 20, padding: "2px 11px", fontSize: 11, fontWeight: 700, fontFamily: "monospace" }}>{s.pattern}</span>
                  <span style={{ background: C.bg, borderRadius: 20, padding: "2px 10px", fontSize: 10, color: C.muted, border: `1px solid ${C.bdr}` }}>#{i + 1}</span>
                </div>
                <div style={{ fontWeight: 800, color: C.text, fontSize: 14 }}>{s.title}</div>
              </div>
              <div style={{ color: s.color, fontSize: 18, fontWeight: 700, flexShrink: 0 }}>{isOpen ? "−" : "+"}</div>
            </div>

            {/* Expanded content */}
            {isOpen && (
              <div style={{ padding: "0 16px 16px" }}>
                {/* Explanation */}
                <div style={{ background: s.color + "08", border: `1px solid ${s.color}25`, borderLeft: `3px solid ${s.color}`, borderRadius: 8, padding: "11px 14px", marginBottom: 12 }}>
                  <div style={{ fontWeight: 700, color: s.color, fontSize: 11, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>What this is and why it works</div>
                  <div style={{ color: C.mid, fontSize: 13, lineHeight: 1.6 }}>{s.explanation}</div>
                </div>
                {/* Reference language connection */}
                <div style={{ background: C.orange + "08", border: `1px solid ${C.orange}25`, borderLeft: `3px solid ${C.orange}`, borderRadius: 8, padding: "11px 14px", marginBottom: 14 }}>
                  <div style={{ fontWeight: 700, color: C.orange, fontSize: 11, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Connection to your other languages</div>
                  <div style={{ color: C.mid, fontSize: 13, lineHeight: 1.6 }}>{s.ref}</div>
                </div>
                {/* Examples */}
                <div style={{ fontWeight: 700, color: C.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Real-life examples — tap ▶ to hear each one</div>
                {s.examples.map(([fr, en, es], j) => (
                  <div key={j} style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 10, padding: "10px 13px", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 5, flexWrap: "wrap" }}>
                      <span style={{ fontWeight: 800, color: C.blue, fontSize: 16 }}>{fr}</span>
                      <PlayBtn text={fr} />
                    </div>
                    <div style={{ color: C.mid, fontSize: 12, marginBottom: es ? 3 : 0 }}>🇬🇧 {en}</div>
                    {es && <div style={{ color: C.orange, fontSize: 12 }}>🇪🇸 {es}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function VocabCard({ fr, en, tLang, rLangs }) {
  const [open, setOpen] = useState(false);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const tName    = TARGETS[tLang]?.name || "French";
  const refNames = rLangs.length > 0 ? rLangs.map(l => REFS[l]?.name || l).join(" and ") : "English";
  const displayFr = fr.includes(" — ") ? fr.split(" — ")[1] : fr;

  const expand = async () => {
    if (open) { setOpen(false); return; }
    setOpen(true);
    if (data) return;
    setLoading(true);
    try {
      const prompt = `You are a ${tName} teacher for ${refNames} speakers. Give a rich explanation of: "${displayFr}" (meaning: ${en}). Return ONLY valid JSON: {"pronunciation":"phonetic guide using simple English sounds","register":"formal / informal / neutral — when is this used?","explanation":"clear explanation of meaning and how/when to use it in real life","ref_connection":"how it compares to ${refNames} — same word? cognate? false friend? no equivalent?","examples":[{"fr":"natural ${tName} sentence","en":"English translation","ref":"${refNames} translation"},{"fr":"example 2","en":"English","ref":"ref"},{"fr":"example 3","en":"English","ref":"ref"}],"tip":"one memorable thing about this word","watch_out":"common mistake to avoid with this word"}`;
      if (!isLoggedIn()) { setData({ error: "NO_KEY" }); setLoading(false); return; }
      const result = await askClaude(prompt, 700, tLang);
      setData(result);
    } catch(e) {
      setData({ error: "Could not load. Check your connection and tap to try again." });
    }
    setLoading(false);
  };

  return (
    <div style={{ background: C.card, border: `2px solid ${open ? C.green : C.bdr}`, borderRadius: 11, marginBottom: 8, boxShadow: C.sh, overflow: "hidden" }}>
      <div onClick={expand} style={{ padding: "11px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontWeight: 800, color: C.blue, fontSize: 16 }}>{displayFr}</span>
            <PlayBtn text={displayFr} sm />
          </div>
          <span style={{ color: C.mid, fontSize: 13 }}>{en}</span>
        </div>
        <span style={{ color: open ? C.green : C.muted, fontSize: 16, fontWeight: 700, flexShrink: 0 }}>{open ? "−" : "+"}</span>
      </div>

      {open && (
        <div style={{ padding: "0 14px 14px" }}>
          {loading && <div style={{ color: C.muted, fontSize: 13, padding: "8px 0" }}>Loading full explanation...</div>}
          {data && data.error && (
            data.error === "NO_KEY" || data.error === "INVALID_KEY"
              ? <div style={{ background:"#fee2e2", border:"1px solid #fca5a5", borderRadius:8, padding:"10px 12px" }}>
                  <div style={{ fontWeight:700, color:"#dc2626", fontSize:13, marginBottom:4 }}>Session expired</div>
                  <div style={{ color:"#7f1d1d", fontSize:12 }}>Please refresh the page and log in again with your access code.</div>
                </div>
              : <div style={{ color: C.red, fontSize: 13 }}>{data.error}</div>
          )}
          {data && !data.error && (
            <div>
              {(data.pronunciation || data.register) && (
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                  {data.pronunciation && <div style={{ background: C.teal + "12", border: `1px solid ${C.teal}25`, borderRadius: 7, padding: "5px 11px", fontSize: 12, color: C.teal }}><b>Pronunciation:</b> {data.pronunciation}</div>}
                  {data.register && <div style={{ background: C.purple + "12", border: `1px solid ${C.purple}25`, borderRadius: 7, padding: "5px 11px", fontSize: 12, color: C.purple }}><b>Register:</b> {data.register}</div>}
                </div>
              )}
              {data.explanation && (

function Vocab({ tLang, rLangs }) {
  const [cat, setCat] = useState(0);
  const [search, setSearch] = useState("");

  if (!TARGETS[tLang]?.built) {
    return <AITabContent tLang={tLang} tabName="vocab" color={C.green} />;
  }

  const curCat = VOCAB_CATS[cat];
  const list   = VL[curCat.key] || [];
  const filtered = search.trim()
    ? list.filter(([fr,en]) => fr.toLowerCase().includes(search.toLowerCase()) || en.toLowerCase().includes(search.toLowerCase()))
    : list;

  return (
    <div>
      <Heading title="Vocabulary" sub="550+ words across 14 categories. Tap any word for pronunciation, grammar notes, and voiced examples." color={C.green} />
      <Info text="Tap any word to expand — you'll see pronunciation, reference language comparison, and 3 real example sentences with audio. Use the Save button to add words to your Flashcards for daily review." color={C.teal} />

      {/* Search */}
      <div style={{ position:"relative", marginBottom:12 }}>
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search any word..."
          style={{ width:"100%", padding:"10px 14px 10px 36px", borderRadius:10, border:`2px solid ${C.bdr}`, fontSize:14, boxSizing:"border-box", background:C.card }}
        />
        <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:C.muted, fontSize:14 }}>🔍</span>
        {search && <button onClick={() => setSearch("")} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:16 }}>×</button>}
      </div>

      {/* Category tabs — horizontal scroll */}
      <div style={{ display:"flex", gap:7, overflowX:"auto", paddingBottom:8, marginBottom:14, scrollbarWidth:"none" }}>
        {VOCAB_CATS.map((c, i) => (
          <button key={i} onClick={() => { setCat(i); setSearch(""); }} style={{
            padding:"6px 14px", borderRadius:20, flexShrink:0,
            border:`2px solid ${cat===i ? c.color : C.bdr}`,
            background:cat===i ? c.color : C.card,
            color:cat===i ? "#fff" : C.muted,
            fontSize:11, fontWeight:700, cursor:"pointer",
          }}>{c.label}</button>
        ))}
      </div>

      {/* Category description + count */}
      {!search && (
        <div style={{ background:curCat.color+"10", border:`1px solid ${curCat.color}25`, borderLeft:`3px solid ${curCat.color}`, borderRadius:8, padding:"9px 13px", marginBottom:12 }}>
          <div style={{ fontWeight:700, color:curCat.color, fontSize:12, marginBottom:2 }}>{curCat.label} — {list.length} words</div>
          <div style={{ color:C.mid, fontSize:12 }}>{curCat.desc}. Tap any word to expand full explanation, pronunciation, and examples.</div>
        </div>
      )}

      {search && (
        <div style={{ color:C.muted, fontSize:12, marginBottom:10 }}>{filtered.length} result{filtered.length!==1?"s":""} for "{search}"</div>
      )}

      {filtered.length === 0 && (
        <div style={{ textAlign:"center", padding:"30px 0", color:C.muted, fontSize:13 }}>No words match your search.</div>
      )}

      {filtered.map(([fr, en], i) => (
        <VocabCard key={fr + i} fr={fr} en={en} tLang={tLang} rLangs={rLangs} />
      ))}
    </div>
  );
}

  const filtered = filter === "All" ? DRILL_DATA : DRILL_DATA.filter(d => d.type === filter);

  const typeColor = { Conjugation: C.blue, Translation: C.green, Vocab: C.orange, Grammar: C.purple };

  return (
    <div>
      <Heading title="Practice Drills" sub="Form your answer mentally first. The effort of recall is where learning happens." color={C.red} />

          <>

            <button onClick={() => setShow(true)} style={{ width: "100%", padding: 14, background: C.blue, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
              Reveal Answer

            <div style={{ background: C.green + "15", border: `2px solid ${C.green}`, borderRadius: 11, padding: 16, marginBottom: 14 }}>

            </div>

        )}

      <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
        {filtered.map((_, i) => (
          <button key={i} onClick={() => { setIdx(i); setShow(false); }} style={{

  const tName = TARGETS[tLang]?.name || "French";
  const phaseData = (tLang === "fr") ? FRENCH_PHASE_DATA : (LANG_PHASE_DATA[tLang] || LANG_PHASE_DATA.en);

  const toggle = (id) => {
    setDone(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  return (
    <div>
      <Heading title={`${tName} Learning Roadmap`} sub="5 phases from zero to elite. Tap any milestone to mark it complete." color={C.orange} />
      <Info text="Tick off each milestone as you achieve it — your progress is saved in this browser. The timeline estimates assume 15-30 minutes of daily practice. Consistency matters far more than duration." color={C.teal} />
      <Info text={`${done.size} milestone${done.size !== 1 ? "s" : ""} completed — keep going!`} color={C.orange} />
      {phaseData.map((p, pi) => (
        <div key={pi} style={{ marginBottom: 20 }}>
          <div style={{ background: `linear-gradient(135deg,${p.color}15,${p.color}05)`, border: `2px solid ${p.color}38`, borderRadius: 14, padding: "12px 15px", marginBottom: 9 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 9, color: p.color, letterSpacing: 3, textTransform: "uppercase", fontFamily: "monospace", marginBottom: 4 }}>Phase {p.phase}</div>
                <div style={{ fontWeight: 900, color: C.text, fontSize: 18 }}>{p.title}</div>
                <div style={{ color: p.color, fontSize: 12, fontWeight: 600, marginTop: 2 }}>{p.dur}</div>
              </div>
              <Tag label={p.dur} color={p.color} />
            </div>
            <div style={{ color: C.muted, fontSize: 13, marginTop: 9, paddingTop: 9, borderTop: `1px solid ${p.color}18` }}>
              Goal: {p.goal}
            </div>
          </div>
          {p.can.map((m, mi) => {
            const id = `${pi}-${mi}`;
            const isDone = done.has(id);
            return (
              <div key={mi} onClick={() => toggle(id)} style={{
                background: isDone ? p.color + "12" : C.card,
                border: `2px solid ${isDone ? p.color + "45" : C.bdr}`,
                borderRadius: 10, padding: "9px 13px", marginBottom: 6,
                display: "flex", gap: 11, alignItems: "center", cursor: "pointer", boxShadow: C.sh,
              }}>
                <div style={{ width: 24, height: 24, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 11, background: isDone ? p.color : "#fff", border: `2px solid ${isDone ? p.color : C.bdr}`, color: isDone ? "#fff" : C.muted }}>
                  {isDone ? "✓" : ""}
                </div>
                <span style={{ color: isDone ? p.color : C.mid, fontSize: 13, fontWeight: isDone ? 700 : 400 }}>{m}</span>
              </div>
            );
          })}
          <div style={{ background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 9, padding: "7px 13px" }}>
            <span style={{ color: C.muted, fontSize: 11, fontWeight: 600 }}>Daily: </span>
            <span style={{ color: C.mid, fontSize: 11 }}>{p.daily}</span>
          </div>
        </div>
      ))}
    </div>
  );
}
