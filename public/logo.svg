<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" fill="none">
  <!-- Mark: rounded square with globe-T symbol -->
  <rect width="52" height="52" rx="13" fill="url(#lg)"/>
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Globe circle -->
  <circle cx="26" cy="26" r="15" stroke="white" stroke-width="2.8" fill="none"/>
  <!-- Vertical meridian (T stem) -->
  <line x1="26" y1="11" x2="26" y2="41" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Horizontal crossbar (T bar) — slightly above center = equator feel -->
  <line x1="11" y1="23" x2="41" y2="23" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Lower latitude arc -->
  <path d="M 14 32 Q 26 36 38 32" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="62" y="34" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="800" fill="#0f172a" letter-spacing="1">TONGE</text>
</svg>
